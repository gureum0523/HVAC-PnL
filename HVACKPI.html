<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC KPI Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #070a10;
  --bg2:     #0c1018;
  --panel:   #101520;
  --panel2:  #161d2a;
  --border:  #1c2438;
  --border2: #232f46;
  --text:    #c8d4f0;
  --text2:   #7a89b0;
  --text3:   #3d4d6a;
  --c1: #00d4b8; /* teal   - AFS      */
  --c2: #6366f1; /* indigo - B2B Non  */
  --c3: #3b82f6; /* blue   - B2B Sales*/
  --c4: #f472b6; /* pink   - B2C      */
  --amber: #f59e0b;
  --green: #10b981;
  --red:   #f43f5e;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
body{min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:var(--bg2);position:sticky;top:0;z-index:50;
  gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,#00d4b8,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#070a10;font-family:var(--mono);
}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text2);font-family:var(--mono)}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge-year{
  font-family:var(--mono);font-size:11px;color:var(--c1);
  padding:4px 10px;background:rgba(0,212,184,.08);
  border:1px solid rgba(0,212,184,.2);border-radius:6px;
}

/* ── Main layout ── */
.main{padding:22px 28px;display:flex;flex-direction:column;gap:20px}

/* ── Group legend ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--panel);transition:all .15s}
.leg.active{border-color:transparent;color:#070a10}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg[data-g="All"].active{background:linear-gradient(135deg,#00d4b8,#3b82f6)}
.leg[data-g="AFS"].active{background:var(--c1);color:#070a10}
.leg[data-g="B2B Non-Sales"].active{background:var(--c2)}
.leg[data-g="B2B Sales"].active{background:var(--c3)}
.leg[data-g="B2C"].active{background:var(--c4);color:#070a10}

/* ── Summary cards ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:860px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c-teal::after{background:linear-gradient(90deg,var(--c1),var(--c3))}
.c-indigo::after{background:linear-gradient(90deg,var(--c2),var(--c3))}
.c-blue::after{background:linear-gradient(90deg,var(--c3),var(--c1))}
.c-pink::after{background:linear-gradient(90deg,var(--c4),var(--c2))}
.card-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-family:var(--mono)}
.card-val{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;font-family:var(--mono)}
.c-teal .card-val{color:var(--c1)}
.c-indigo .card-val{color:var(--c2)}
.c-blue .card-val{color:var(--c3)}
.c-pink .card-val{color:var(--c4)}
.card-sub{font-size:11px;color:var(--text2);margin-top:6px}

/* ── Search ── */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:7px 14px;font-size:12px;color:var(--text);font-family:var(--sans);
  width:220px;outline:none;
}
.search::placeholder{color:var(--text3)}
.search:focus{border-color:var(--c1)}
.count-info{font-size:12px;color:var(--text2);font-family:var(--mono);margin-left:auto}

/* ── Person grid ── */
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* ── Person card ── */
.pcard{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:border-color .18s,transform .18s;cursor:pointer;
}
.pcard:hover{border-color:var(--border2);transform:translateY(-2px)}
.pcard-head{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.av{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#070a10;flex-shrink:0;
  font-family:var(--mono);
}
.av-AFS{background:linear-gradient(135deg,var(--c1),#3b82f6)}
.av-B2BN{background:linear-gradient(135deg,var(--c2),#8b5cf6)}
.av-B2BS{background:linear-gradient(135deg,var(--c3),var(--c1))}
.av-B2C{background:linear-gradient(135deg,var(--c4),var(--c2))}
.pcard-info{flex:1;min-width:0}
.pname{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prole{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtag{
  padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;
  font-family:var(--mono);letter-spacing:.5px;white-space:nowrap;flex-shrink:0;
}
.gtag-AFS{background:rgba(0,212,184,.12);color:var(--c1)}
.gtag-B2BN{background:rgba(99,102,241,.12);color:var(--c2)}
.gtag-B2BS{background:rgba(59,130,246,.12);color:var(--c3)}
.gtag-B2C{background:rgba(244,114,182,.12);color:var(--c4)}

/* KPI rows */
.kpi-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.kpi-row{display:flex;flex-direction:column;gap:4px}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.kpi-label{font-size:11px;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-weight{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.kpi-target{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);flex-shrink:0}
.kbar-bg{height:3px;background:var(--border2);border-radius:99px;overflow:hidden}
.kbar-fill{height:100%;border-radius:99px}
.kbar-AFS{background:linear-gradient(90deg,var(--c1),#3b82f6)}
.kbar-B2BN{background:linear-gradient(90deg,var(--c2),#8b5cf6)}
.kbar-B2BS{background:linear-gradient(90deg,var(--c3),var(--c1))}
.kbar-B2C{background:linear-gradient(90deg,var(--c4),var(--c2))}

/* ── Modal ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.78);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:18px;width:560px;max-width:100%;max-height:90vh;
  overflow-y:auto;animation:pop .18s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;position:sticky;top:0;
  background:var(--panel);z-index:2;
}
.modal-av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#070a10;font-family:var(--mono)}
.modal-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.modal-role{font-size:12px;color:var(--text2);margin-top:2px}
.modal-close{margin-left:auto;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:none;color:var(--text2);cursor:pointer;font-size:16px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-section{margin-bottom:20px}
.msec-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono)}
.kpi-table{width:100%;border-collapse:collapse;font-size:12px}
.kpi-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);background:var(--panel2);border-bottom:1px solid var(--border);font-family:var(--mono)}
.kpi-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.kpi-table tr:last-child td{border-bottom:none}
.kpi-table tr:hover td{background:var(--panel2)}
.obj-text{color:var(--text);font-weight:500}
.measure-text{color:var(--text2);font-size:11px;margin-top:2px}
.w-chip{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;background:rgba(255,255,255,.06);color:var(--text2)}
.score-cell{font-family:var(--mono);font-size:11px;color:var(--text);text-align:right;white-space:nowrap}
.score-label{font-size:9px;color:var(--text3);margin-bottom:2px}
.scores-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.score-box{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.score-box .sl{font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.score-box .sv{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text)}
.score-box.s5 .sv{color:var(--green)}
.score-box.s2 .sv{color:var(--text2)}
.unit-tag{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}

.empty{text-align:center;padding:60px;color:var(--text3);font-size:13px;grid-column:1/-1}
</style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="brand">

    <div>

    </div>

  <div class="top-right">

<main class="main">

    <span class="count-info" id="countInfo"></span>
  </div>

  <!-- Person grid -->
  <div class="person-grid" id="gridEl"></div>

</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalEl"></div>
</div>

const GROUPS = ['All','AFS','B2B Non-Sales','B2B Sales','B2C'];
const GCLS = {'AFS':'AFS','B2B Non-Sales':'B2BN','B2B Sales':'B2BS','B2C':'B2C'};
const GCOL = {'AFS':'var(--c1)','B2B Non-Sales':'var(--c2)','B2B Sales':'var(--c3)','B2C':'var(--c4)'};

let activeGroup = 'All';

// ── Format ───────────────────────────────────────────────────────
function fmt(v, unit){
  if(v===null||v===undefined) return '—';
  if(unit==='Days vs LY') return (v>=0?'+':'')+v.toFixed(1)+' d';
  if(unit==='Months') return v.toFixed(1)+' mo';
  if(unit==='Counts') return Math.round(v).toLocaleString();
  if(unit==='Qty') return Math.round(v).toLocaleString();
  if(unit==='GP_PCT'||unit==='%'||unit==='') return (v*100).toFixed(0)+'%';
  // SAR
  if(Math.abs(v)>=1e9) return (v/1e9).toFixed(2)+'B';
  if(Math.abs(v)>=1e6) return (v/1e6).toFixed(1)+'M';
  if(Math.abs(v)>=1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}

// ── Render Legend ─────────────────────────────────────────────────
function renderLegend(){
  const el=document.getElementById('legendEl');
  el.innerHTML=GROUPS.map(g=>`
    <div class="leg${g===activeGroup?' active':''}" data-g="${g}" onclick="setGroup('${g}')">
      <div class="leg-dot" style="background:${g==='All'?'var(--c1)':GCOL[g]}"></div>
      ${g} ${g!=='All'?`(${PEOPLE.filter(p=>p.group===g).length})`:`(${PEOPLE.length})`}
    </div>
  `).join('');
}
function setGroup(g){activeGroup=g;renderLegend();renderCards();render()}

// ── Render Cards ─────────────────────────────────────────────────
function renderCards(){
  const data=activeGroup==='All'?PEOPLE:PEOPLE.filter(p=>p.group===activeGroup);
  const total=data.length;
  const groups=[...new Set(data.map(p=>p.group))].length;
  // Count unique objectives
  const objs=new Set();data.forEach(p=>p.kpis.forEach(k=>objs.add(k.objective)));
  // Total KPIs
  const totalKpis=data.reduce((s,p)=>s+p.kpis.length,0);

  document.getElementById('cardsEl').innerHTML=`
    <div class="card c-teal">
      <div class="card-label">Total Managers</div>
      <div class="card-val">${total}</div>
      <div class="card-sub">Across ${groups} group${groups!==1?'s':''}</div>
    </div>
    <div class="card c-indigo">
      <div class="card-label">KPI Items</div>
      <div class="card-val">${totalKpis}</div>
      <div class="card-sub">${Math.round(totalKpis/total*10)/10} avg per person</div>
    </div>
    <div class="card c-blue">
      <div class="card-label">Unique Objectives</div>
      <div class="card-val">${objs.size}</div>
      <div class="card-sub">Strategic KRAs</div>
    </div>
    <div class="card c-pink">
      <div class="card-label">Groups</div>
      <div class="card-val">${groups}</div>
      <div class="card-sub">AFS · B2B · B2C</div>
    </div>
  `;
}

// ── Render Grid ───────────────────────────────────────────────────
function filtered(){
  const q=(document.getElementById('searchEl').value||'').toLowerCase();
  return PEOPLE.filter(p=>
    (activeGroup==='All'||p.group===activeGroup) &&
    (p.name.toLowerCase().includes(q)||p.role.toLowerCase().includes(q)||p.id.includes(q))
  );
}

function render(){
  const data=filtered();
  document.getElementById('countInfo').textContent=`${data.length} / ${PEOPLE.length} managers`;
  const grid=document.getElementById('gridEl');
  if(!data.length){grid.innerHTML='<div class="empty">No results found.</div>';return;}
  grid.innerHTML=data.map(p=>{
    const gcls=GCLS[p.group]||'AFS';
    const gtag=p.group==='B2B Non-Sales'?'B2B Non-Sales':p.group==='B2B Sales'?'B2B Sales':p.group;
    const kpiRows=p.kpis.map(k=>{
      const hasTarget=k.score3!==null;
      const targetVal=hasTarget?fmt(k.score3,k.unit):'TBD';
      const w=Math.round(k.weight*100);
      return `<div class="kpi-row">
        <div class="kpi-top">
          <span class="kpi-label" title="${k.measure}">${k.measure}</span>
          <span class="kpi-weight">${w}%</span>
          <span class="kpi-target">${targetVal}${k.unit&&k.unit!=='M SAR'&&k.unit!=='%'&&k.unit!==''&&k.unit!=='GP_PCT'?` <span style="font-size:9px;color:var(--text3)">${k.unit}</span>`:''}</span>
        </div>
        <div class="kbar-bg"><div class="kbar-fill kbar-${gcls}" style="width:${w}%"></div></div>
      </div>`;
    }).join('');
    return `<div class="pcard" onclick="openModal('${p.id}')">
      <div class="pcard-head">
        <div class="av av-${gcls}">${p.name[0]}</div>
        <div class="pcard-info">
          <div class="pname">${p.name}</div>
          <div class="prole">${p.role}</div>
        </div>
        <span class="gtag gtag-${gcls}">${gtag}</span>
      </div>
      <div class="kpi-list">${kpiRows}</div>
    </div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(id){
  const p=PEOPLE.find(x=>x.id===id);if(!p) return;
  const gcls=GCLS[p.group]||'AFS';
  const kpiRows=p.kpis.map(k=>{
    const w=Math.round(k.weight*100);
    const scores=[
      {label:'Score 2',val:k.score2,cls:'s2'},
      {label:'Score 3',val:k.score3,cls:'s3'},
      {label:'Score 4',val:k.score4,cls:'s4'},
      {label:'Score 5',val:k.score5,cls:'s5'},
    ];
    return `<tr>
      <td>
        <div class="obj-text">${k.objective}</div>
        <div class="measure-text">${k.measure}</div>
      </td>
      <td style="text-align:center"><span class="w-chip">${w}%</span></td>
      <td>
        <div class="scores-grid">
          ${scores.map(s=>`<div class="score-box ${s.cls}">
            <div class="sl">${s.label}</div>
            <div class="sv">${fmt(s.val,k.unit)}</div>
            ${p.id==='2498'&&k.unit&&k.unit!=='%'&&k.unit!==''&&k.unit!=='GP_PCT'?`<div class="unit-tag">${k.unit}</div>`:''}
          </div>`).join('')}
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('modalEl').innerHTML=`
    <div class="modal-head">
      <div class="modal-av av-${gcls}">${p.name[0]}</div>
      <div>
        <div class="modal-name">${p.name} <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">#${p.id}</span></div>
        <div class="modal-role">${p.role} · <span style="color:${GCOL[p.group]}">${p.group}</span></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="msec-title">KPI Targets — Score Levels</div>
        <table class="kpi-table">
          <thead><tr>
            <th>Objective / KPI</th>
            <th style="text-align:center">Weight</th>
            <th>Targets by Score</th>
          </tr></thead>
          <tbody>${kpiRows}</tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

// ── Init ──────────────────────────────────────────────────────────
renderLegend();
renderCards();
render();
</script>
