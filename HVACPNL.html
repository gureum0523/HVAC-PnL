<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC P&L Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN: Clean corporate — light ground,
   crisp typography, confident data viz.
   Fonts: DM Sans (body) + DM Mono (data)
═══════════════════════════════════════ */
:root{
  --bg:#f0f2f7;
  --white:#ffffff;
  --s1:#f7f8fc;
  --s2:#eef0f6;
  --bd:#d8dce8;
  --bd2:#c4c9d8;
  --tx:#0f1723;
  --tx2:#4a5568;
  --tx3:#8a96a8;
  --ac:#1a56e8;   /* electric blue */
  --ac2:#3b7ef6;
  --gr:#059669;   /* emerald */
  --gr2:#10b981;
  --re:#dc2626;
  --re2:#ef4444;
  --ye:#d97706;
  --ye2:#f59e0b;
  --pu:#7c3aed;
  --or:#ea580c;

  /* Division palette */
  --c0:#1a56e8; /* Projects */
  --c1:#059669; /* AC Dealer */
  --c2:#d97706; /* AMC */
  --c3:#7c3aed; /* SEC */
  --c4:#ea580c; /* Installation */
  --c5:#dc2626; /* ESCO */

  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --r6:6px; --r8:8px; --r12:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
}
/* ── DARK MODE ── */
body.dark{
  --bg:#0d1117;--white:#161b22;--s1:#1c2230;--s2:#212838;
  --bd:#2d3748;--bd2:#3d4f6a;--tx:#e2e8f4;--tx2:#94a3c0;--tx3:#556070;
  --ac:#4d8ef7;--ac2:#6ba3fb;--gr:#10b981;--gr2:#34d399;
  --re:#f87171;--re2:#fca5a5;--ye:#fbbf24;--ye2:#fcd34d;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.4);
}
body.dark .badge-grn{background:rgba(52,211,153,.15);color:#34d399;}
body.dark .badge-red{background:rgba(248,113,113,.15);color:#fca5a5;}
body.dark .badge-amb{background:rgba(251,191,36,.12);color:#fcd34d;}
body.dark .badge-up{background:rgba(52,211,153,.15);color:#34d399;}
body.dark .badge-dn{background:rgba(248,113,113,.15);color:#fca5a5;}
.dm-toggle{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:500;transition:all .2s;flex-shrink:0;}
.dm-toggle:hover{border-color:var(--ac);color:var(--ac);}
.dm-sun{font-size:14px;}


*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;}

/* ─── SHELL ─── */
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh;}

/* ─── TOP BAR ─── */
.topbar{
  background:var(--white);
  border-bottom:1px solid var(--bd);
  padding:0 24px;
  display:flex;align-items:center;gap:20px;
  height:54px;
  box-shadow:0 1px 0 var(--bd);
  position:sticky;top:0;z-index:100;
}
.logo-mark{
  font-family:var(--mono);font-size:13px;font-weight:500;
  color:var(--ac);letter-spacing:.12em;text-transform:uppercase;
  background:rgba(26,86,232,.08);border:1px solid rgba(26,86,232,.18);
  padding:4px 10px;border-radius:var(--r6);flex-shrink:0;
}
.topbar-title{font-size:14px;font-weight:600;color:var(--tx);letter-spacing:-.01em;}
.spacer{flex:1;}

/* Tab navigation */
.tab-nav{display:flex;gap:2px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r8);padding:3px;}
.tab-nav-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:6px 18px;border-radius:6px;border:none;
  background:transparent;color:var(--tx2);cursor:pointer;
  transition:all .18s;letter-spacing:-.01em;white-space:nowrap;
}
.tab-nav-btn:hover{color:var(--tx);background:rgba(255,255,255,.6);}
.tab-nav-btn.on{background:var(--white);color:var(--ac);font-weight:600;box-shadow:var(--shadow);}

/* ─── BODY ─── */
.body{display:grid;grid-template-columns:200px 1fr;overflow:hidden;height:calc(100vh - 54px);}

/* ─── SIDEBAR ─── */
.sidebar{
  background:var(--white);
  border-right:1px solid var(--bd);
  overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:14px;
}
.sb-sec{display:flex;flex-direction:column;gap:5px;}
.sb-label{
  font-family:var(--mono);font-size:9px;font-weight:500;
  color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;
  padding:0 2px;margin-bottom:3px;
}
.div-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 9px;border-radius:var(--r6);
  border:1px solid transparent;cursor:pointer;
  background:transparent;font-family:var(--sans);font-size:12px;
  font-weight:500;color:var(--tx2);width:100%;text-align:left;
  transition:all .15s;
}
.div-btn:hover{background:var(--s1);color:var(--tx);}
.div-btn.sel{background:rgba(26,86,232,.06);border-color:rgba(26,86,232,.2);color:var(--tx);}
.div-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.div-chk{
  margin-left:auto;width:15px;height:15px;
  border:1.5px solid var(--bd2);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;flex-shrink:0;transition:all .15s;
}
.div-btn.sel .div-chk{background:var(--ac);border-color:var(--ac);color:#fff;}

.sall-row{display:flex;gap:5px;}
.sall-btn{
  flex:1;font-family:var(--sans);font-size:10px;font-weight:500;
  padding:5px 6px;border-radius:var(--r6);
  border:1px solid var(--bd);background:var(--s1);
  color:var(--tx2);cursor:pointer;transition:all .15s;
}
.sall-btn:hover{border-color:var(--ac);color:var(--ac);}

.yr-seg{display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r6);padding:2px;gap:2px;}
.yr-btn{
  flex:1;font-family:var(--mono);font-size:10px;font-weight:500;
  padding:4px 6px;border-radius:4px;border:none;
  background:transparent;color:var(--tx3);cursor:pointer;
  transition:all .15s;text-align:center;
}
.yr-btn.on{background:var(--white);color:var(--ac);box-shadow:0 1px 2px rgba(0,0,0,.08);}

.period-row{display:flex;align-items:center;gap:6px;}
.period-lbl{font-family:var(--mono);font-size:9px;color:var(--tx3);width:24px;flex-shrink:0;}
.period-sel{
  flex:1;background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r6);color:var(--tx);
  font-family:var(--mono);font-size:10px;padding:5px 7px;
  cursor:pointer;outline:none;appearance:none;
}
.period-sel:focus{border-color:var(--ac);}
.period-hint{font-family:var(--mono);font-size:9px;color:var(--tx3);}

.chk-row{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 2px;}
.chk-row input{accent-color:var(--ac);width:13px;height:13px;}
.chk-row span{font-size:11px;font-weight:500;color:var(--tx2);}

.sb-divider{height:1px;background:var(--bd);margin:0 -2px;}

/* ─── CONTENT ─── */
.content{overflow-y:auto;padding:20px;}
.page{display:none;}.page.on{display:block;}

/* ─── SUMMARY PAGE ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi-card{
  background:var(--white);border:1px solid var(--bd);border-radius:var(--r12);
  padding:16px 18px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);transition:box-shadow .2s;
}
.kpi-card:hover{box-shadow:var(--shadow-md);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc);}
.kpi-label{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--tx);line-height:1;margin-bottom:7px;letter-spacing:-.02em;}
.kpi-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--tx3);}

/* Badges */
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:3px;}
.badge-up{background:rgba(5,150,105,.1);color:var(--gr);border:1px solid rgba(5,150,105,.2);}
.badge-dn{background:rgba(220,38,38,.08);color:var(--re);border:1px solid rgba(220,38,38,.15);}
.badge-ne{background:var(--s2);color:var(--tx3);border:1px solid var(--bd);}
.badge-b{background:rgba(26,86,232,.08);color:var(--ac);border:1px solid rgba(26,86,232,.18);}
.badge-ach-o{background:rgba(5,150,105,.1);color:var(--gr);border:1px solid rgba(5,150,105,.2);}
.badge-ach-m{background:rgba(217,119,6,.1);color:var(--ye);border:1px solid rgba(217,119,6,.2);}
.badge-ach-l{background:rgba(220,38,38,.08);color:var(--re);border:1px solid rgba(220,38,38,.15);}

/* Chart cards */
.chart-grid{display:grid;gap:12px;margin-bottom:16px;}
.chart-grid-2{grid-template-columns:1fr 1fr;}
.chart-grid-3{grid-template-columns:1fr 1fr 1fr;}
.chart-grid-32{grid-template-columns:3fr 2fr;}
.chart-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r12);padding:18px;box-shadow:var(--shadow);}
.chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
.chart-title{font-size:12px;font-weight:600;color:var(--tx);letter-spacing:-.01em;}
.chart-sub{font-family:var(--mono);font-size:10px;color:var(--tx3);}

/* Waterfall bars */
.wf-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.wf-label{font-size:11px;font-weight:500;color:var(--tx2);width:110px;flex-shrink:0;}
.wf-bar-bg{flex:1;height:20px;background:var(--s2);border-radius:4px;overflow:hidden;position:relative;}
.wf-bar-fg{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 6px;position:relative;}
.wf-bar-val{font-family:var(--mono);font-size:10px;font-weight:500;white-space:nowrap;}
.wf-right{font-family:var(--mono);font-size:10px;color:var(--tx3);width:80px;text-align:right;flex-shrink:0;}

/* SGA summary bars (exec) */
.sga-exec-row{padding:9px 0;border-bottom:1px solid var(--s2);}
.sga-exec-row:last-child{border-bottom:none;}
.sga-exec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sga-exec-name{font-size:12px;font-weight:500;color:var(--tx);}
.sga-exec-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tx);}
.sga-exec-bars{display:flex;flex-direction:column;gap:3px;}
.sga-exec-bar-row{display:flex;align-items:center;gap:6px;}
.sga-exec-bar-lbl{font-family:var(--mono);font-size:9px;color:var(--tx3);width:30px;flex-shrink:0;}
.sga-exec-bar-bg{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.sga-exec-bar-fg{height:100%;border-radius:3px;}
.sga-exec-bar-rt{font-family:var(--mono);font-size:9px;color:var(--tx3);width:40px;text-align:right;flex-shrink:0;}

/* Period comparison table (exec) */
table.exec-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
table.exec-tbl thead tr:first-child th{position:sticky;top:0;z-index:5;background:#1c2230;}
table.exec-tbl thead tr:last-child th{position:sticky;top:37px;z-index:5;background:#1c2230;}
table.exec-tbl th{
  font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;
  text-align:right;border-bottom:2px solid var(--bd);background:#1c2230;
  white-space:nowrap;
}
table.exec-tbl th.L{text-align:left;position:sticky;left:0;z-index:6;background:#1c2230;}
table.exec-tbl thead tr:first-child th.L{background:#1c2230;z-index:7;}
table.exec-tbl thead tr:last-child th.L{background:#1c2230;z-index:7;}
table.exec-tbl thead tr:first-child th{background:#1c2230;}
table.exec-tbl thead tr:last-child th{background:#1c2230;}
table.exec-tbl td.L{text-align:left;position:sticky;left:0;z-index:3;}
table.exec-tbl td{padding:0;text-align:right;border-bottom:1px solid var(--s2);}
.etc{padding:8px 12px;display:block;font-size:12px;color:var(--tx2);}
table.exec-tbl tr:hover .etc{background:#1c2230;}
table.exec-tbl tr.et-gs .etc{font-weight:700;color:var(--tx);font-size:13px;background:#1e2a40;}
table.exec-tbl tr.et-gp .etc{font-weight:700;color:var(--ac);font-size:13px;}
table.exec-tbl tr.et-cm .etc{font-weight:700;color:var(--gr);font-size:13px;background:#182820;}
table.exec-tbl tr.et-sga-hd .etc{font-weight:600;color:var(--ye);}
table.exec-tbl tr.et-sga-sub .etc{font-size:11px;color:var(--tx2);padding-left:26px;}
table.exec-tbl tr.et-sga-subi .etc{font-size:11px;color:var(--tx3);padding-left:38px;font-style:italic;}
table.exec-tbl tr.et-ratio .etc{font-size:10px;color:var(--tx3);font-family:var(--mono);}
table.exec-tbl tr.et-pct .etc{font-size:10px;color:var(--tx3);font-family:var(--mono);padding-left:24px;}
table.exec-tbl tr.et-sep td{height:6px;background:var(--bg);border:none;}

/* ─── DETAIL PAGE ─── */
.det-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.det-title{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-.02em;}
.det-meta{font-family:var(--mono);font-size:10px;color:var(--tx3);}

/* Detail P&L table */
.det-wrap{background:var(--white);border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden;box-shadow:var(--shadow);}
.det-wrap-hd{padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.det-wrap-title{font-size:12px;font-weight:600;color:var(--tx);}

table.det{width:100%;border-collapse:collapse;}
table.det th{
  font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.06em;
  padding:8px 10px;text-align:right;
  border-bottom:1px solid var(--bd);background:var(--s1);
  white-space:nowrap;position:sticky;top:0;z-index:2;
}
table.det th.L{text-align:left;min-width:190px;}
table.det th.tot-col{background:rgba(26,86,232,.05);border-left:1px solid rgba(26,86,232,.15);}
table.det td{font-family:var(--mono);font-size:11px;padding:0;text-align:right;white-space:nowrap;}
table.det td.L{text-align:left;}
table.det td.tot-col{background:rgba(26,86,232,.03);border-left:1px solid rgba(26,86,232,.1);}
.dtc{padding:6px 10px;display:block;}
table.det tr:hover .dtc{background:rgba(26,86,232,.025);}

/* Detail row types */
tr.dr-gs .dtc{font-weight:700;color:var(--tx);background:rgba(26,86,232,.04);font-size:12px;}
tr.dr-dis .dtc{color:var(--tx3);font-size:10px;}
tr.dr-dis-item .dtc{color:var(--tx3);font-size:10px;padding-left:18px;}
tr.dr-ns .dtc{font-weight:600;color:var(--tx);border-top:1px solid var(--bd);font-size:12px;}
tr.dr-cogs .dtc{font-weight:500;color:var(--tx);}
tr.dr-gp .dtc{font-weight:700;color:var(--ac);font-size:12px;background:rgba(26,86,232,.03);}
tr.dr-pct .dtc{color:var(--tx3);font-size:10px;padding-left:18px;}
tr.dr-sga-hd .dtc{font-weight:600;color:var(--ye);border-top:1px solid var(--bd);}
tr.dr-sga-cat .dtc{color:var(--tx2);font-size:11px;padding-left:18px;}
tr.dr-sga-tot .dtc{font-weight:600;color:var(--ye);border-top:1px dotted var(--bd2);}
tr.dr-cm .dtc{font-weight:700;color:var(--gr);font-size:12px;background:rgba(5,150,105,.04);border-top:1px solid var(--bd);}
tr.dr-ratio .dtc{color:var(--tx3);font-size:10px;}
tr.dr-sep td{height:5px;background:var(--bg);border:none;}
tr.dr-spacer td{height:1px;background:var(--bd2);border:none;}
.pos{color:var(--gr)!important;}.neg{color:var(--re)!important;}
.db{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;display:inline-block;margin-left:2px;}
.db-u{background:rgba(5,150,105,.1);color:var(--gr);}
.db-d{background:rgba(220,38,38,.08);color:var(--re);}
.ab{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;display:inline-block;}
.ab-o{background:rgba(5,150,105,.1);color:var(--gr);}
.ab-m{background:rgba(217,119,6,.1);color:var(--ye);}
.ab-l{background:rgba(220,38,38,.08);color:var(--re);}

/* Col group header for budget / prev */
.col-grp-actual{background:#1a2340!important;color:var(--ac)!important;}
.col-grp-budget{background:#1e232e!important;}
.col-grp-prev{background:#1b2028!important;}
.col-grp-ach{background:#182420!important;color:var(--gr)!important;}
.col-grp-yoy{background:#18221f!important;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--tx3);}

/* Misc */
.tag-a{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(26,86,232,.1);color:var(--ac);border:1px solid rgba(26,86,232,.2);}
.tag-b{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:var(--s2);color:var(--tx3);border:1px solid var(--bd);}
.inline-sep{display:inline-block;width:1px;height:10px;background:var(--bd);margin:0 6px;vertical-align:middle;}
</style>
</head>
<body class="dark">
<div class="shell">

<!-- TOP BAR -->
<div class="topbar">
  <span class="logo-mark">HVAC</span>
  <span class="topbar-title">P&L Dashboard</span>
  <div class="spacer"></div><div class="tab-nav">
    <button class="tab-nav-btn on" onclick="switchTab('exec',this)">📊 Executive Summary</button>
    <button class="tab-nav-btn" onclick="switchTab('detail',this)">📋 Detail Analysis</button>
  </div>
</div>

<div class="body">
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-sec">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="sb-label">Division</div>
    </div>
    <div class="sall-row"><button class="sall-btn" onclick="selAll()">Select All</button><button class="sall-btn" onclick="selNone()">Reset</button></div>
    <div id="div-btns" style="margin-top:4px;display:flex;flex-direction:column;gap:2px;"></div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-sec">
    <div class="sb-label">Year</div>
    <div class="yr-seg">
      <button class="yr-btn on" onclick="setYr('2026',this)">2026</button>
      <button class="yr-btn" onclick="setYr('2025',this)">2025</button>
      <button class="yr-btn" onclick="setYr('2024',this)">2024</button>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sb-label">Period</div>
    <div class="period-row"><span class="period-lbl">From</span><select class="period-sel" id="sel-f" onchange="onPeriod()"></select></div>
    <div class="period-row"><span class="period-lbl">To</span><select class="period-sel" id="sel-t" onchange="onPeriod()"></select></div>
    <div class="period-hint" id="period-txt">Full Year</div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-sec">

// ══ HELPERS ══
function fK(v){if(v==null||isNaN(v))return'—';const a=Math.abs(v);if(a>=1e6)return(v/1e6).toFixed(2)+'B';if(a>=1e3)return(v/1e3).toFixed(1)+'M';return v.toFixed(0)+'K';}
function fP(v){if(v==null||isNaN(v)||!isFinite(v))return'—';return v.toFixed(1)+'%';}
function pctOf(n,d){return d?(n/d)*100:null;}
function arr12(val=0){return Array(12).fill(val);}
function addArr(a,b){return a.map((v,i)=>v+(b[i]||0));}
function subArr(a,b){return a.map((v,i)=>v-(b[i]||0));}
function sumArr(a){return a.reduce((s,v)=>s+v,0);}
function sliceSum(arr,f,t){const sl=arr.slice(f-1,t);return{arr:sl,sum:sl.reduce((a,b)=>a+b,0)};}

// Get array for metric+divs
function getM(yrk,metric,divArr){
  const src=D.gpc[yrk];if(!src||!src[metric])return arr12();
  const m=src[metric];
  return arr12().map((_,i)=>divArr.reduce((s,pc)=>(s+(m[pc]||arr12())[i]),0));
}
function getSGA(yrk,divArr){
  const m=D.sga_pc[yrk];if(!m)return arr12();
  return arr12().map((_,i)=>divArr.reduce((s,pc)=>(s+(m[pc]||arr12())[i]),0));
}
function getSGACat(yrk,cat,divArr){
  const src=D.sga_pc_cat[yrk];if(!src)return arr12();
  return arr12().map((_,i)=>divArr.reduce((s,pc)=>(s+((src[pc]||{})[cat]||arr12())[i]),0));
}
function calcMetrics(yrk,divArr){
  const GS=getM(yrk,'Gross Sales',divArr);
  const YED=getM(yrk,'Year End Discount',divArr);
  const ADD=getM(yrk,'Additional Discount',divArr);
  const VPD=getM(yrk,'VP Discount',divArr);
  const DSI=getM(yrk,'DSI',divArr);
  const NS=getM(yrk,'Net Sales',divArr);
  const CG=getM(yrk,'COGS',divArr);
  const IP=getM(yrk,'Inventory Provision',divArr);
  const VS=getM(yrk,'Vendor Support',divArr);
  const GP=getM(yrk,'Gross Profit',divArr);
  const SGA=getSGA(yrk,divArr);
  const CM=GP.map((v,i)=>v-SGA[i]);
  const cats={};
  ALL_SGA_CATS.forEach(cat=>{cats[cat]=getSGACat(yrk,cat,divArr);});
  return{GS,YED,ADD,VPD,DSI,NS,CG,IP,VS,GP,SGA,CM,cats};
}

// ══ EXEC KPIs ══
function renderExecKPIs(A,B,P,sl,yr,pl){
  const gs=sl(A.GS).sum,gp=sl(A.GP).sum,cm=sl(A.CM).sum,sga=sl(A.SGA).sum;
  const gsB=B?sl(B.GS).sum:null,gpB=B?sl(B.GP).sum:null,cmB=B?sl(B.CM).sum:null;
  const gsP=P?sl(P.GS).sum:null,gpP=P?sl(P.GP).sum:null,cmP=P?sl(P.CM).sum:null;

  function badge(a,b,type='ach'){
    if(b==null)return'';
    if(type==='ach'){
      const r=b?a/b*100:null;
      if(!r)return'';
      const cls=r>=100?'badge-ach-o':r>=80?'badge-ach-m':'badge-ach-l';
      return `<span class="badge ${cls}">${r.toFixed(0)}% Achieved</span>`;
    }
    if(type==='yoy'){
      const r=b?((a-b)/Math.abs(b)*100):null;
      if(r==null)return'';
      return `<span class="badge ${r>=0?'badge-up':'badge-dn'}">${r>=0?'▲':'▼'}${Math.abs(r).toFixed(1)}% vs Prior Year</span>`;
    }
  }

  const cards=[
    {label:'Gross Sales',val:gs,c:'#1a56e8',b1:badge(gs,gsB,'ach'),b2:badge(gs,gsP,'yoy'),sub:`NS: ${fK(sl(A.NS).sum)}`,kc:'var(--ac)'},
    {label:'Gross Profit',val:gp,c:'#0077cc',b1:badge(gp,gpB,'ach'),b2:badge(gp,gpP,'yoy'),sub:`GP%: ${fP(pctOf(gp,gs))} of GS`,kc:'var(--ac2)'},
    {label:'SG&A',val:sga,c:'#d97706',b1:'',b2:'',sub:`SGA/GP: ${fP(pctOf(sga,gp))}`,kc:'var(--ye)'},
    {label:'Contribution Margin',val:cm,c:'#059669',b1:badge(cm,cmB,'ach'),b2:badge(cm,cmP,'yoy'),sub:`CM%: ${fP(pctOf(cm,gs))} of GS`,kc:'var(--gr)'},
  ];

  document.getElementById('exec-kpis').innerHTML=cards.map(c=>`

    </div>`).join('');
}

// ══ EXEC SGA TREND: selectable + rate vs GP% lines ══
function renderExecSGA(A,P,sl){
  const f=ST.f,t=ST.t;
  const mLabels=MO.slice(f-1,t);
  const yrk=ST.yr+'A',yrk_b=ST.yr+'B',yrk_p=(Number(ST.yr)-1)+'A';
  const showB=ST.showBud,showP=ST.showPre;
  const isDark=document.body.classList.contains('dark');
  const tc=isDark?'#94a3b8':'#64748b';
  const gc=isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.05)';
  const catMap={emp:'Employee Cost',comm:'Sales commission',ext:'External Labor'};
  const laborAll=['Employee Cost','Sales commission','External Labor'];

  function getCatSlice(key,cat){
    const src=D.sga_cat[key];
    if(!src||!src[cat])return Array(mLabels.length).fill(0);
    return src[cat].slice(f-1,t);
  }
  function sumCatSlice(key,cats){
    return cats.map(c=>getCatSlice(key,c)).reduce((acc,a)=>acc.map((v,i)=>v+a[i]),Array(mLabels.length).fill(0));
  }

  // Data arrays
  const gpA=A.GP.slice(f-1,t);
  const gpB=showB?(D.gpc[yrk_b]?.['Gross Profit']?.['Total']||Array(12).fill(0)).slice(f-1,t):null;
  const gpP=showP?(D.gpc[yrk_p]?.['Gross Profit']?.['Total']||Array(12).fill(0)).slice(f-1,t):null;
  let aArr,bArr,pArr;
  if(ST.sgaView==='total'){
    aArr=sumCatSlice(yrk,laborAll);
    bArr=showB?sumCatSlice(yrk_b,laborAll):null;
    pArr=showP?sumCatSlice(yrk_p,laborAll):null;
  } else {
    const cat=catMap[ST.sgaView];
    aArr=getCatSlice(yrk,cat);
    bArr=showB?getCatSlice(yrk_b,cat):null;
    pArr=showP?getCatSlice(yrk_p,cat):null;
  }
  const ratA=aArr.map((v,i)=>gpA[i]?v/gpA[i]*100:0);
  const ratB=bArr&&gpB?bArr.map((v,i)=>gpB[i]?v/gpB[i]*100:0):null;
  const ratP=pArr&&gpP?pArr.map((v,i)=>gpP[i]?v/gpP[i]*100:0):null;

  const tooltipBase={backgroundColor:'#1a1e28',borderColor:'#2d3748',borderWidth:1,bodyColor:'#e2e8f4'};
  const xScale={grid:{display:false},ticks:{color:tc,font:{family:'DM Mono',size:9}}};
  const yScale={grid:{color:gc},ticks:{color:tc,font:{family:'DM Mono',size:9},callback:v=>fK(v)}};

  // ── Chart 1: Amount bars (A / B / PY) ──
  const dsAmt=[];
  dsAmt.push({label:'Actual',data:aArr,backgroundColor:'rgba(59,126,246,.5)',borderColor:'#3b7ef6',borderWidth:1.5,borderRadius:3});
  if(bArr)dsAmt.push({label:'Budget',data:bArr,backgroundColor:'rgba(100,116,139,.28)',borderColor:'#64748b',borderWidth:1,borderRadius:3});
  if(pArr)dsAmt.push({label:'Prior Year',data:pArr,backgroundColor:'rgba(148,163,184,.2)',borderColor:'#94a3b8',borderWidth:1,borderRadius:3});

  const ctx1=document.getElementById('c-exec-sga').getContext('2d');
  if(CH.sga)CH.sga.destroy();
  CH.sga=new Chart(ctx1,{type:'bar',data:{labels:mLabels,datasets:dsAmt},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',align:'end',labels:{color:tc,font:{family:'DM Mono',size:9},boxWidth:10,boxHeight:10,padding:8}},
        tooltip:{...tooltipBase,callbacks:{label:c=>' '+c.dataset.label+': '+fK(c.parsed.y)}}
      },
      scales:{x:{...xScale,ticks:{...xScale.ticks,display:false}},y:yScale}
    }
  });

  // ── Chart 2: Rate% lines (A / B / PY) — the star of the show ──
  const dsRate=[];
  dsRate.push({label:'Actual',data:ratA,borderColor:'#3b7ef6',backgroundColor:'rgba(59,126,246,.08)',borderWidth:2.5,pointRadius:3.5,pointBackgroundColor:'#3b7ef6',tension:.3,fill:true});
  if(ratB)dsRate.push({label:'Budget',data:ratB,borderColor:'#f59e0b',backgroundColor:'transparent',borderWidth:1.5,borderDash:[6,3],pointRadius:2,tension:.3});
  if(ratP)dsRate.push({label:'Prior Year',data:ratP,borderColor:'#64748b',backgroundColor:'transparent',borderWidth:1.5,borderDash:[3,2],pointRadius:2,tension:.3});

  const ctx2=document.getElementById('c-exec-sga-rate').getContext('2d');
  if(CH.sgaRate)CH.sgaRate.destroy();
  CH.sgaRate=new Chart(ctx2,{type:'line',data:{labels:mLabels,datasets:dsRate},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',align:'end',labels:{color:tc,font:{family:'DM Mono',size:9},boxWidth:20,boxHeight:2,padding:8,usePointStyle:true}},
        tooltip:{...tooltipBase,callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y.toFixed(1)+'%'}}
      },
      scales:{
        x:xScale,
        y:{grid:{color:gc},ticks:{color:tc,font:{family:'DM Mono',size:9},callback:v=>v.toFixed(0)+'%'}}
      }
    }
  });
}

// ══ EXEC TABLE ══
function renderExecTable(A,B,P,sl,pl){
  document.getElementById('exec-period-tag').textContent=pl;

  const f=ST.f,t=ST.t;
  const mLabels=MO.slice(f-1,t);   // individual month labels
  const nM=mLabels.length;
  const showB=!!B,showP=!!P;

  // Always show a Total column (period sum)
  const allLabels=[...mLabels,'Total'];
  const nAll=allLabels.length;

  // Slice array and append sum
  function slT(arr){
    const s=arr.slice(f-1,t);
    return[...s, s.reduce((a,b)=>a+b,0)];
  }

  // ── Header ─────────────────────────────────────────
  // Layout:  Line Item | Jan…MonthN | Total || vs Budget% | vs PY Δ | vs PY%
  // "vs Budget" → one achievement% column per period (compact)
  // "vs Prior Year" → absolute change Δ + % row below (separate rows, not separate cols)
  // This keeps the table readable: no more stacking 4+ column groups

  let grpCols=`<th class="L" rowspan="2" style="min-width:160px;position:sticky;left:0;z-index:7;background:#1c2230">Line Item</th>`;
  // Actual group: months + Total
  grpCols+=`<th colspan="${nAll}" class="col-grp-actual" style="text-align:center;border-left:2px solid rgba(26,86,232,.3)">Actual</th>`;
  if(showB) grpCols+=`<th colspan="${nAll}" class="col-grp-budget" style="text-align:center;border-left:1px solid var(--bd)">vs Budget (Achieved %)</th>`;
  if(showP) grpCols+=`<th colspan="${nAll}" class="col-grp-prev" style="text-align:center;border-left:1px solid var(--bd)">vs Prior Year (Δ Amount)</th>`;
  if(showP) grpCols+=`<th colspan="${nAll}" class="col-grp-yoy" style="text-align:center;border-left:none">vs Prior Year (%)</th>`;

  let subCols=``;
  function addSubCols(cls, firstBdr){
    allLabels.forEach((l,i)=>{
      const bdr=i===0?firstBdr:'none';
      subCols+=`<th class="${cls}" style="border-left:${bdr};font-weight:${l==='Total'?'700':'500'};${l==='Total'?'background:rgba(255,255,255,.04)':''}">${l}</th>`;
    });
  }
  addSubCols('col-grp-actual','2px solid rgba(26,86,232,.3)');
  if(showB) addSubCols('col-grp-budget','1px solid var(--bd)');
  if(showP) addSubCols('col-grp-prev','1px solid var(--bd)');
  if(showP) addSubCols('col-grp-yoy','none');

  const thead=`<thead><tr>${grpCols}</tr><tr>${subCols}</tr></thead>`;

  // ── Cell builders ───────────────────────────────────
  function firstBdrStyle(i,bdr){ return i===0?`border-left:${bdr}`:``; }

  // Actual value cells (months + Total)
  function vCells(arr, firstBdr='2px solid rgba(26,86,232,.3)', pctDen=null){
    return slT(arr).map((v,i)=>{
      const isTotal=i===nM;
      const bdr=firstBdrStyle(i,firstBdr);
      const style=`${v<0?'color:var(--re);':''}${isTotal?'font-weight:700;':''}`; 
      return`<td${bdr?` style="${bdr}"`:''}><span class="etc" style="${style}">${fK(v)}</span></td>`;
    }).join('');
  }

  // % cells (e.g. GP% of GS)
  function pctCells(numArr, denArr, firstBdr='2px solid rgba(26,86,232,.3)'){
    const nSlice=slT(numArr), dSlice=slT(denArr);
    return nSlice.map((n,i)=>{
      const isTotal=i===nM;
      const bdr=firstBdrStyle(i,firstBdr);
      const pct=dSlice[i]?n/dSlice[i]*100:null;
      const style=`color:var(--tx3);font-size:10px;${isTotal?'font-weight:600;':''}`;
      return`<td${bdr?` style="${bdr}"`:''}><span class="etc" style="${style}">${pct!=null?pct.toFixed(1)+'%':'—'}</span></td>`;
    }).join('');
  }

  // Achievement % vs Budget
  function achCells(aArr,bArr, firstBdr='1px solid var(--bd)'){
    if(!bArr)return'';
    const aSlice=slT(aArr), bSlice=slT(bArr);
    return aSlice.map((a,i)=>{
      const isTotal=i===nM;
      const bdr=firstBdrStyle(i,firstBdr);
      const b=bSlice[i];
      if(!b) return`<td${bdr?` style="${bdr}"`:''}><span class="etc">—</span></td>`;
      const r=a/b*100;
      const cls=r>=100?'ab-o':r>=80?'ab-m':'ab-l';
      return`<td${bdr?` style="${bdr}"`:''}><span class="etc"><span class="ab ${cls}">${r.toFixed(0)}%</span></span></td>`;
    }).join('');
  }

  // PY delta — just the Δ amount, clean
  function pyDeltaCells(aArr,pArr, firstBdr='1px solid var(--bd)'){
    if(!pArr)return'';
    const aSlice=slT(aArr), pSlice=slT(pArr);
    return aSlice.map((a,i)=>{
      const isTotal=i===nM;
      const bdr=firstBdrStyle(i,firstBdr);
      const p=pSlice[i];
      const d=a-p;
      const cls=d>=0?'pos':'neg';
      const style=`${isTotal?'font-weight:700;':''}`;
      return`<td${bdr?` style="${bdr}"`:''}><span class="etc ${cls}" style="${style}">${d>=0?'+':''}${fK(d)}</span></td>`;
    }).join('');
  }

  // PY change % — just the %, clean
  function pyPctCells(aArr,pArr){
    if(!pArr)return'';
    const aSlice=slT(aArr), pSlice=slT(pArr);
    return aSlice.map((a,i)=>{
      const isTotal=i===nM;
      const p=pSlice[i];
      const r=p?((a-p)/Math.abs(p)*100):null;
      const cls=r!=null?(r>=0?'pos':'neg'):'';
      const style=`font-size:10px;${isTotal?'font-weight:700;':''}`;
      return`<td><span class="etc ${cls}" style="${style}">${r!=null?(r>=0?'+':'')+r.toFixed(1)+'%':'—'}</span></td>`;
    }).join('');
  }

  // pp delta for % rows vs PY
  function pyPpCells(numA,denA,numP,denP){
    if(!numP)return'';
    const naS=slT(numA),daS=slT(denA),npS=slT(numP),dpS=slT(denP);
    return naS.map((na,i)=>{
      const pA=daS[i]?na/daS[i]*100:null;
      const pP=dpS[i]?npS[i]/dpS[i]*100:null;
      const d=pA!=null&&pP!=null?pA-pP:null;
      const cls=d!=null?(d>=0?'pos':'neg'):'';
      const style=`font-size:10px;`;
      return`<td><span class="etc ${cls}" style="${style}">${d!=null?(d>=0?'+':'')+d.toFixed(1)+'pp':'—'}</span></td>`;
    }).join('');
  }

  // pp delta for % rows vs Budget
  function achPpCells(numA,denA,numB,denB){
    if(!numB)return'';
    const naS=slT(numA),daS=slT(denA),nbS=slT(numB),dbS=slT(denB);
    return naS.map((na,i)=>{
      const pA=daS[i]?na/daS[i]*100:null;
      const pB=dbS[i]?nbS[i]/dbS[i]*100:null;
      const d=pA!=null&&pB!=null?pA-pB:null;
      const cls=d!=null?(d>=0?'pos':'neg'):'';
      return`<td style="${firstBdrStyle(i,'1px solid var(--bd)')}"><span class="etc ${cls}" style="font-size:10px">${d!=null?(d>=0?'+':'')+d.toFixed(1)+'pp':'—'}</span></td>`;
    }).join('');
  }

  function emptyB(){ return showB?allLabels.map((_,i)=>`<td${i===0?' style="border-left:1px solid var(--bd)"':''}><span class="etc"></span></td>`).join(''):''; }
  function emptyP(){ return showP?allLabels.map(()=>`<td><span class="etc"></span></td>`).join(''):''; }

  function row(cls,lbl,aArr,bArr=null,pArr=null){
    return`<tr class="${cls}">
      <td class="L" style="position:sticky;left:0;z-index:3"><span class="etc" style="background:#161b22;display:block">${lbl}</span></td>
      ${vCells(aArr)}
      ${achCells(aArr,bArr)}
      ${pyDeltaCells(aArr,pArr)}
      ${pyPctCells(aArr,pArr)}
    </tr>`;
  }
  function pRow(cls,lbl,numA,denA,numB=null,denB=null,numP=null,denP=null){
    return`<tr class="${cls}">
      <td class="L" style="position:sticky;left:0;z-index:3"><span class="etc" style="background:#161b22;display:block">${lbl}</span></td>
      ${pctCells(numA,denA)}
      ${achPpCells(numA,denA,numB,denB)}
      ${pyPpCells(numA,denA,numP,denP)}
      ${showP?allLabels.map(()=>`<td></td>`).join(''):''}
    </tr>`;
  }
  function sepRow(){return`<tr class="et-sep"><td colspan="999"></td></tr>`;}

  // SGA sub-items
  let sgaRows='';
  EXEC_SGA_ITEMS.forEach(item=>{
    const aArr=A.cats[item.key]||arr12();
    const bArr=B?B.cats[item.key]:null;
    const pArr=P?P.cats[item.key]:null;
    sgaRows+=row('et-sga-sub',item.label,aArr,bArr,pArr);
  });

  const tbody=`<tbody>
    ${row('et-gs','Gross Sales',A.GS,B?.GS,P?.GS)}
    ${pRow('et-pct','  Net Sales % of GS',A.NS,A.GS,B?.NS,B?.GS,P?.NS,P?.GS)}
    ${sepRow()}
    ${row('et-gp','Gross Profit',A.GP,B?.GP,P?.GP)}
    ${pRow('et-pct','  GP% of GS',A.GP,A.GS,B?.GP,B?.GS,P?.GP,P?.GS)}
    ${pRow('et-pct','  COGS% of GS',A.CG,A.GS,B?.CG,B?.GS,P?.CG,P?.GS)}
    ${sepRow()}
    <tr class="et-sga-hd">
      <td class="L" style="position:sticky;left:0;z-index:3"><span class="etc" style="background:#161b22;display:block">SG&A Key Items</span></td>
      ${vCells(A.SGA)}${achCells(A.SGA,B?.SGA)}${pyDeltaCells(A.SGA,P?.SGA)}${pyPctCells(A.SGA,P?.SGA)}
    </tr>
    ${sgaRows}
    <tr class="et-ratio">
      <td class="L" style="position:sticky;left:0;z-index:3"><span class="etc" style="background:#161b22;display:block;padding-left:14px">SGA / GP (%)</span></td>
      ${pctCells(A.SGA,A.GP)}${achPpCells(A.SGA,A.GP,B?.SGA,B?.GP)}${pyPpCells(A.SGA,A.GP,P?.SGA,P?.GP)}${showP?allLabels.map(()=>'<td></td>').join(''):''}
    </tr>
    ${sepRow()}
    ${row('et-cm','Contribution Margin',A.CM,B?.CM,P?.CM)}
    ${pRow('et-pct','  CM% of GS',A.CM,A.GS,B?.CM,B?.GS,P?.CM,P?.GS)}
  </tbody>`;

  document.getElementById('t-exec').innerHTML=thead+tbody;
}

// ══ DETAIL TABLE ══
function renderDetailTable(A,B,P,sl,divArr,pl,yr){
  const hasTotal=ST.t>ST.f;
  const mLabels=MO.slice(ST.f-1,ST.t);
  if(hasTotal)mLabels.push('Total');
  const showB=!!B,showP=!!P;
  const nM=mLabels.length;

  // Title/meta
  const divLabel=divArr.length===DIVS.length?'All Divisions':divArr.length===1?divArr[0]:`${divArr.join(' + ')}`;
  document.getElementById('det-title').textContent=`${divLabel} — P&L Detail`;
  document.getElementById('det-meta').textContent=`${yr} ${pl}`;
  document.getElementById('det-wrap-sub').textContent=`${yr}A ${showB?'| vs Budget':''}${showP?'| vs Prior Year':''}`;

  const tags=[`<span class="tag-a">${yr} Actual</span>`];
  if(showB)tags.push(`<span class="tag-b">vs Budget</span>`);
  if(showP)tags.push(`<span style="font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:var(--s2);color:var(--tx3);border:1px solid var(--bd)">${Number(yr)-1}A vs PY</span>`);
  document.getElementById('det-tags').innerHTML=tags.join('');

  // Header
  function thGroup(label,n,cls,first=false){
    return`<th colspan="${n}" class="${cls}" style="text-align:center;${first?'border-left:2px solid rgba(26,86,232,.3)':''}">${label}</th>`;
  }
  let grp=`<tr><th class="L" rowspan="2">Line Item</th>`;
  grp+=thGroup(`${yr} Actual`,nM,'col-grp-actual',true);
  if(showB){grp+=thGroup('Budget',nM,'col-grp-budget');grp+=thGroup('vs Budget',nM,'col-grp-ach');}
  if(showP){grp+=thGroup(`${Number(yr)-1}A`,nM,'col-grp-prev');grp+=thGroup('vs Prior Year',nM,'col-grp-yoy');}
  grp+=`</tr><tr>`;
  for(let g=0;g<1+(showB?2:0)+(showP?2:0);g++){
    mLabels.forEach((l,i)=>{
      const isFirst=i===0;
      const bdr=isFirst?(g===0?'2px solid rgba(26,86,232,.3)':g===1||g===2?'1px solid rgba(26,86,232,.15)':g===3?'1px solid var(--bd)':'1px solid rgba(5,150,105,.15)'):'none';
      const cls=g===0?'col-grp-actual':g===1?'col-grp-budget':g===2?'col-grp-ach':g===3?'col-grp-prev':'col-grp-yoy';
      grp+=`<th class="${cls}" style="border-left:${bdr}">${l}</th>`;
    });
  }
  grp+=`</tr>`;
  const thead=`<thead>${grp}</thead>`;

  // Cell helpers
  function slArr(arr){const s=arr.slice(ST.f-1,ST.t);return hasTotal?[...s,s.reduce((a,b)=>a+b,0)]:s;}
  function vCells(arr,style='',firstBdr='2px solid rgba(26,86,232,.3)'){
    return slArr(arr).map((v,i)=>`<td class="${i===0?'tot-col':''}"${i===0?` style="border-left:${firstBdr}"`:''}><span class="dtc" style="${v<0?'color:var(--re)':''}${style}">${fK(v)}</span></td>`).join('');
  }
  function bCells(aArr,bArr){
    if(!bArr)return'';
    return slArr(aArr).map((a,i)=>{
      const b=slArr(bArr)[i];
      if(!b)return`<td><span class="dtc">—</span></td>`;
      const r=a/b*100;const cls=r>=100?'ab-o':r>=80?'ab-m':'ab-l';
      return`<td${i===0?' style="border-left:1px solid rgba(26,86,232,.15)"':''}><span class="dtc"><span class="ab ${cls}">${r.toFixed(0)}%</span></span></td>`;
    }).join('');
  }
  function yCells(aArr,pArr){
    if(!pArr)return'';
    return slArr(aArr).map((a,i)=>{
      const p=slArr(pArr)[i];
      const d=a-p,r=p?d/Math.abs(p)*100:null;
      const ds=r!=null?`<span class="db ${r>=0?'db-u':'db-d'}">${r>=0?'+':''}${r.toFixed(1)}%</span>`:'';
      return`<td${i===0?' style="border-left:1px solid var(--bd)"':''}><span class="dtc ${d>=0?'pos':'neg'}" style="font-size:10px">${fK(d)}${ds}</span></td>`;
    }).join('');
  }
  function prCells(aArr,pArr){
    if(!pArr)return'';
    return slArr(aArr).map((a,i)=>{
      const p=slArr(pArr)[i];
      return`<td${i===0?' style="border-left:1px solid rgba(5,150,105,.15)"':''}><span class="dtc" style="color:var(--tx3);font-size:10px">${fK(p)}</span></td>`;
    }).join('');
  }
  function pctValCells(numArr,denArr){
    return slArr(numArr).map((n,i)=>{
      const dv=slArr(denArr)[i];
      return`<td class="${i===0?'tot-col':''}"${i===0?' style="border-left:2px solid rgba(26,86,232,.3)"':''}><span class="dtc" style="color:var(--tx3);font-size:10px">${fP(pctOf(n,dv))}</span></td>`;
    }).join('');
  }
  function pctBCells(nA,dA,nB,dB){
    if(!nB)return'';
    return slArr(nA).map((_,i)=>{
      const pA=pctOf(slArr(nA)[i],slArr(dA)[i]),pB=pctOf(slArr(nB)[i],slArr(dB)[i]);
      const d=pA!=null&&pB!=null?pA-pB:null;
      return`<td${i===0?' style="border-left:1px solid rgba(26,86,232,.15)"':''}><span class="dtc" style="font-size:10px">${d!=null?`<span class="db ${d>=0?'db-u':'db-d'}">${d>=0?'+':''}${d.toFixed(1)}pp</span>`:'—'}</span></td>`;
    }).join('');
  }
  function pctYC(nA,dA,nP,dP){
    if(!nP)return'';
    return slArr(nA).map((_,i)=>{
      const pA=pctOf(slArr(nA)[i],slArr(dA)[i]),pP=pctOf(slArr(nP)[i],slArr(dP)[i]);
      const d=pA!=null&&pP!=null?pA-pP:null;
      return`<td${i===0?' style="border-left:1px solid var(--bd)"':''}><span class="dtc" style="font-size:10px">${d!=null?`<span class="db ${d>=0?'db-u':'db-d'}">${d>=0?'+':''}${d.toFixed(1)}pp</span>`:'—'}</span></td>`;
    }).join('');
  }
  function emB(n){return showB?Array(n*2).fill('<td><span class="dtc"></span></td>').join(''):''}
  function emP(n){return showP?Array(n*2).fill('<td><span class="dtc"></span></td>').join(''):''}

  function rowDet(cls,lbl,aArr,bArr=null,pArr=null,style='',indent=0){
    const li=indent?` style="padding-left:${indent}px"`:'';
    return`<tr class="${cls}"><td class="L"><span class="dtc"${li}>${lbl}</span></td>${vCells(aArr,style)}${bCells(aArr,bArr)}${yCells(aArr,pArr)}${prCells(aArr,pArr)}</tr>`;
  }
  function pctRowDet(cls,lbl,nA,dA,nB=null,dB=null,nP=null,dP=null,indent=16){
    return`<tr class="${cls}"><td class="L"><span class="dtc" style="padding-left:${indent}px;color:var(--tx3);font-size:10px">${lbl}</span></td>${pctValCells(nA,dA)}${pctBCells(nA,dA,nB,dB)}${pctYC(nA,dA,nP,dP)}${prCells(nA,nP)}</tr>`;
  }
  function sep(){return`<tr class="dr-sep"><td colspan="999"></td></tr>`;}
  function spacer(){return`<tr class="dr-spacer"><td colspan="999"></td></tr>`;}

  // SGA category rows (ALL categories)
  let sgaCatRows='';
  if(ST.showSga){
    ALL_SGA_CATS.forEach(cat=>{
      const aArr=A.cats[cat]||arr12();
      const bArr=B?(B.cats[cat]||arr12()):null;
      const pArr=P?(P.cats[cat]||arr12()):null;
      const hasAny=[...slArr(aArr),...(bArr?slArr(bArr):[])].some(v=>v!==0);
      if(hasAny){
        const lbl=`${SGA_KO[cat]||cat} <span style="color:var(--tx3);font-size:9px">(${cat})</span>`;
        sgaCatRows+=rowDet('dr-sga-cat',lbl,aArr,bArr,pArr,'',18);
      }
    });
  }

  // SGA/GP ratio
  function ratioRow(){
    const lbl='SGATotal / Gross Profit (%)';
    return`<tr class="dr-ratio"><td class="L"><span class="dtc">${lbl}</span></td>${pctValCells(A.SGA,A.GP)}${pctBCells(A.SGA,A.GP,B?.SGA,B?.GP)}${pctYC(A.SGA,A.GP,P?.SGA,P?.GP)}${prCells(A.SGA,P?.SGA)}</tr>`;
  }

  const tbody=`<tbody>
    ${rowDet('dr-gs','■ Gross Sales',A.GS,B?.GS,P?.GS)}
    ${rowDet('dr-dis-item','  Year End Discount',A.YED,B?.YED,P?.YED,'',14)}
    ${rowDet('dr-dis-item','  Additional Discount',A.ADD,B?.ADD,P?.ADD,'',14)}
    ${rowDet('dr-dis-item','  VP Discount',A.VPD,B?.VPD,P?.VPD,'',14)}
    ${rowDet('dr-dis-item','  DSI',A.DSI,B?.DSI,P?.DSI,'',14)}
    ${spacer()}
    ${rowDet('dr-ns','■ Net Sales',A.NS,B?.NS,P?.NS)}
    ${pctRowDet('dr-pct','NS% of GS',A.NS,A.GS,B?.NS,B?.GS,P?.NS,P?.GS)}
    ${spacer()}
    ${rowDet('dr-cogs','COGS',A.CG,B?.CG,P?.CG)}
    ${pctRowDet('dr-pct','COGS% of GS',A.CG,A.GS,B?.CG,B?.GS,P?.CG,P?.GS)}
    ${rowDet('dr-cogs','Inventory Provision',A.IP,B?.IP,P?.IP,'',14)}
    ${rowDet('dr-cogs','Vendor Support',A.VS,B?.VS,P?.VS,'',14)}
    ${spacer()}
    ${rowDet('dr-gp','■ Gross Profit',A.GP,B?.GP,P?.GP)}
    ${pctRowDet('dr-pct','GP% of Net Sales',A.GP,A.NS,B?.GP,B?.NS,P?.GP,P?.NS)}
    ${pctRowDet('dr-pct','GP% of GS',A.GP,A.GS,B?.GP,B?.GS,P?.GP,P?.GS)}
    ${sep()}
    ${rowDet('dr-sga-hd','■ SG&A',A.SGA,B?.SGA,P?.SGA)}
    ${sgaCatRows}
    ${spacer()}
    ${rowDet('dr-sga-tot','SG&A Total',A.SGA,B?.SGA,P?.SGA)}
    ${pctRowDet('dr-pct','SGA% of NS',A.SGA,A.NS,B?.SGA,B?.NS,P?.SGA,P?.NS)}
    ${ratioRow()}
    ${sep()}
    ${rowDet('dr-cm','■ Contribution Margin',A.CM,B?.CM,P?.CM)}
    ${pctRowDet('dr-pct','CM% of Net Sales',A.CM,A.NS,B?.CM,B?.NS,P?.CM,P?.NS,'dr-ratio')}
    ${pctRowDet('dr-pct','CM% of GS',A.CM,A.GS,B?.CM,B?.GS,P?.CM,P?.GS,'dr-ratio')}
  </tbody>`;

  document.getElementById('t-detail').innerHTML=thead+tbody;
}

// ══ INIT ══
buildSidebar();
render();
</script>
</body>
</html>
