<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAKER — HVAC Finance Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070d;
  --surface:#0a0e18;
  --border:#151e30;
  --border2:#1e2d44;
  --text:#dce8f8;
  --muted:#4d6a8a;
  --dim:#1c2e45;
  --accent:#3d7fff;
  --accent2:#00e5b0;
  --accent3:#ff6b35;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── GRID BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(61,127,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(61,127,255,.04) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;z-index:0
}

/* ── GLOWS ── */
.glow{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
.g1{width:700px;height:700px;background:rgba(61,127,255,.12);top:-250px;left:-200px}
.g2{width:500px;height:500px;background:rgba(0,229,176,.08);bottom:-180px;right:-120px}
.g3{width:300px;height:300px;background:rgba(255,107,53,.06);top:40%;left:55%}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:40px 56px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;flex-direction:column;gap:4px}
.brand-name{
  font-size:1.6rem;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1
}
.brand-name span{
  background:linear-gradient(90deg,#3d7fff,#00e5b0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.brand-sub{
  font-size:.62rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);font-family:'IBM Plex Mono',monospace
}
.header-right{display:flex;align-items:center;gap:8px}
.pill{
  font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 12px;border-radius:99px;font-family:'IBM Plex Mono',monospace
}
.pill-live{
  background:rgba(0,229,176,.1);color:#00e5b0;
  border:1px solid rgba(0,229,176,.2)
}
.pill-fy{
  background:rgba(61,127,255,.1);color:#6da0ff;
  border:1px solid rgba(61,127,255,.2)
}
.live-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:#00e5b0;margin-right:5px;
  animation:blink 1.8s ease-in-out infinite
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── HERO ── */
.hero{
  position:relative;z-index:10;
  padding:48px 56px 36px;
}
.hero-eyebrow{
  display:flex;align-items:center;gap:10px;
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent);font-family:'IBM Plex Mono',monospace;
  margin-bottom:20px
}
.hero-eyebrow::after{
  content:'';flex:1;max-width:60px;height:1px;background:var(--accent);opacity:.4
}
.hero h1{
  font-size:3.4rem;font-weight:800;letter-spacing:-.05em;
  line-height:1;color:#fff;
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(100deg,#3d7fff 0%,#00e5b0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hero-rule{
  width:40px;height:2px;
  background:linear-gradient(90deg,#3d7fff,transparent);
  margin:28px 0
}

/* ── PORTALS SECTION ── */
.section{position:relative;z-index:10;padding:0 56px 80px}
.section-header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:32px
}
.section-label{
  font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);font-family:'IBM Plex Mono',monospace
}
.section-line{flex:1;height:1px;background:var(--border2)}

.t-green{
  --pa:#22d3ee;--pb:#06b6d4;
  --pi-bg:rgba(34,211,238,.1);--pi-border:rgba(34,211,238,.2);--pi-shadow:rgba(34,211,238,.15);
  --pt-bg:rgba(34,211,238,.12);--pt-color:#67e8f9
}

/* ── PORTAL GRID ── */
.portal-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px
}

.portal{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:32px 28px 28px;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .25s cubic-bezier(.22,1,.36,1), border-color .25s, box-shadow .25s;
  cursor:pointer;
}

/* animated gradient border on hover */
.portal::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,var(--pa),var(--pb));
  opacity:0;transition:opacity .25s;z-index:0
}
.portal:hover{
  transform:translateY(-6px);
  border-color:var(--pa);
  box-shadow:0 20px 60px rgba(0,0,0,.5), 0 0 0 1px var(--pa), inset 0 1px 0 rgba(255,255,255,.05)
}
.portal:hover::before{opacity:.05}

.portal-inner{position:relative;z-index:1;display:flex;flex-direction:column;flex:1}

.portal-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:24px;
  border:1px solid var(--pi-border);
  background:var(--pi-bg);
  transition:transform .25s;
  box-shadow:0 4px 16px var(--pi-shadow)
}
.portal:hover .portal-icon{transform:scale(1.08) rotate(-4deg)}

.portal-tag{
  position:absolute;top:0;right:0;
  font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  padding:4px 10px;border-radius:0 0 0 10px;
  background:var(--pt-bg);color:var(--pt-color)
}

.portal h2{
  font-size:1.05rem;font-weight:700;letter-spacing:-.02em;
  color:#fff;margin-bottom:8px;line-height:1.2
}
.portal-desc{
  font-size:.75rem;color:var(--muted);line-height:1.6;
  font-family:'IBM Plex Mono',monospace;
  margin-bottom:auto
}

.portal-footer{
  margin-top:24px;padding-top:16px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.portal-status{
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;color:var(--muted)
}
.portal-arrow{
  width:30px;height:30px;border-radius:50%;
  background:var(--dim);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:var(--muted);
  transition:all .25s
}
.portal:hover .portal-arrow{
  background:var(--pa);color:#fff;
  transform:translate(3px,-3px)
}

/* ── COLOUR THEMES ── */
.t-blue{
  --pa:#3d7fff;--pb:#6366f1;
  --pi-bg:rgba(61,127,255,.1);--pi-border:rgba(61,127,255,.2);--pi-shadow:rgba(61,127,255,.15);
  --pt-bg:rgba(61,127,255,.12);--pt-color:#6da0ff
}
.t-teal{
  --pa:#00e5b0;--pb:#06b6d4;
  --pi-bg:rgba(0,229,176,.1);--pi-border:rgba(0,229,176,.2);--pi-shadow:rgba(0,229,176,.15);
  --pt-bg:rgba(0,229,176,.12);--pt-color:#6ee7b7
}
.t-orange{
  --pa:#ff6b35;--pb:#f59e0b;
  --pi-bg:rgba(255,107,53,.1);--pi-border:rgba(255,107,53,.2);--pi-shadow:rgba(255,107,53,.15);
  --pt-bg:rgba(255,107,53,.12);--pt-color:#fcd34d
}
.t-purple{
  --pa:#a78bfa;--pb:#6366f1;
  --pi-bg:rgba(167,139,250,.1);--pi-border:rgba(167,139,250,.2);--pi-shadow:rgba(167,139,250,.15);
  --pt-bg:rgba(167,139,250,.12);--pt-color:#c4b5fd
}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;
  padding:20px 56px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
footer p{font-size:.62rem;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* ── ANIMATIONS ── */
.fade-up{opacity:0;transform:translateY(24px);animation:fadeUp .6s ease forwards}
.fade-up:nth-child(1){animation-delay:.05s}
.fade-up:nth-child(2){animation-delay:.12s}
.fade-up:nth-child(3){animation-delay:.19s}
.fade-up:nth-child(4){animation-delay:.26s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
header{animation:fadeUp .5s ease both}
.hero{animation:fadeUp .5s .1s ease both}
.section{animation:fadeUp .5s .2s ease both}

/* ── RESPONSIVE ── */
@media(max-width:1200px){
  .portal-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:900px){
  .portal-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  header,.hero,.section{padding-left:20px;padding-right:20px}
  .hero h1{font-size:2.2rem}
  .portal-grid{grid-template-columns:1fr}
  footer{padding:20px}
}
</style>
</head>
<body>

<div class="glow g2"></div>

  </div>
</div>

<footer>

</body>
