<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC PSI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; background: #f0f2f7; color: #0f172a; }

/* ── TOKENS ── */
:root {
  --bg:    #f0f2f7;
  --card:  #ffffff;
  --s1:    #f7f8fc;
  --bdr:   #e2e6f0;
  --bdr2:  #c7d2e8;
  --t1:    #0f172a;
  --t2:    #374151;
  --t3:    #6b7280;
  --t4:    #9ca3af;
  --act:   #2563eb;
  --best:  #059669;
  --ml:    #d97706;
  --worst: #dc2626;
  --inv:   #7c3aed;
  --ml-l:  #fef3c7;
  --best-l:#d1fae5;
  --worst-l:#fee2e2;
  --inv-l: #ede9fe;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: #0f172a; height: 52px;
  display: flex; align-items: center; gap: 14px; padding: 0 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.logo { background: var(--act); color: #000; font-weight: 800; font-size: 11px; letter-spacing: 2px; padding: 4px 10px; border-radius: 4px; }
.tb-title { color: #fff; font-size: 14px; font-weight: 700; }
.tb-sub { color: #64748b; font-size: 11px; }
.tb-pill { margin-left: auto; font-size: 11px; background: rgba(37,99,235,.18); border: 1px solid rgba(37,99,235,.35); color: #93c5fd; padding: 3px 10px; border-radius: 4px; }

/* SAVE */
.save-wrap { display: flex; align-items: center; gap: 8px; }
.save-ind { font-size: 10px; color: #64748b; }
.save-ind.unsaved { color: #fbbf24; }
.save-ind.saved { color: #34d399; }
.btn-save { font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; background: #1e293b; color: #475569; transition: all .18s; }
.btn-save.active { background: #16a34a; color: #fff; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}50%{box-shadow:0 0 0 7px rgba(22,163,74,0)} }
.btn-clr { font-size: 10px; color: #475569; background: none; border: 1px solid #334155; padding: 4px 9px; border-radius: 4px; cursor: pointer; display: none; }

/* ── SUBBAR ── */
.subbar {
  position: sticky; top: 52px; z-index: 90;
  background: #fff; border-bottom: 2px solid var(--bdr);
  display: flex; align-items: center; gap: 0; padding: 0 24px; flex-wrap: wrap;
}
.grp-tab { font-size: 12px; font-weight: 500; color: var(--t3); padding: 11px 15px; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; transition: all .12s; white-space: nowrap; }
.grp-tab:hover { color: var(--t2); }
.grp-tab.on { color: var(--act); border-bottom-color: var(--act); font-weight: 700; }
.tab-sep { width: 1px; height: 16px; background: var(--bdr); margin: 0 4px; align-self: center; }
.met-pills { display: flex; gap: 5px; margin: 0 8px; }
.met-pill { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--bdr); cursor: pointer; background: #fff; color: var(--t3); transition: all .12s; }
.met-pill.on-cogs { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
.met-pill.on-unit { background: var(--best-l); color: var(--best); border-color: #6ee7b7; }

/* SCENARIO BUTTONS */
.scen-grp { display: flex; gap: 5px; margin: 0 4px; }
.scen-btn { font-size: 10px; font-weight: 700; padding: 4px 11px; border-radius: 3px; border: 1px solid; cursor: pointer; transition: all .12s; }
.scen-btn[data-s="Best"]        { border-color: var(--best);  color: var(--best);  background: transparent; }
.scen-btn[data-s="Most Likely"] { border-color: var(--ml);    color: var(--ml);    background: transparent; }
.scen-btn[data-s="Worst"]       { border-color: var(--worst); color: var(--worst); background: transparent; }
.scen-btn.on[data-s="Best"]        { background: var(--best);  color: #fff; }
.scen-btn.on[data-s="Most Likely"] { background: var(--ml);    color: #fff; }
.scen-btn.on[data-s="Worst"]       { background: var(--worst); color: #fff; }

/* ── MAIN ── */
.main { padding: 20px 24px 60px; display: flex; flex-direction: column; gap: 18px; }

/* ── KPI STRIP ── */
.kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.kpi-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
.kc-si::before  { background: var(--act); }
.kc-st::before  { background: var(--best); }
.kc-inv::before { background: var(--inv); }
.kc-mos::before { background: var(--inv); }
.kpi-lbl { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--t3); margin-bottom: 6px; }
.kpi-val { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--t3); margin-top: 4px; }
.kpi-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }
.tag-up   { background: var(--best-l); color: var(--best); }
.tag-dn   { background: var(--worst-l); color: var(--worst); }
.tag-warn { background: var(--inv-l); color: var(--inv); }

/* ── GROUP CARD ── */
.grp-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 10px; }
.grp-card-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 18px; background: var(--s1); border-bottom: 1px solid var(--bdr); }
.grp-card-title { font-size: 13px; font-weight: 700; }
.legend { display: flex; gap: 14px; margin-left: auto; align-items: center; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--t3); }
.leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

/* ── DETAILS/SUMMARY (category collapse) ── */
.cat-details { border-top: 1px solid var(--bdr); }
.cat-details:first-child { border-top: none; }

.cat-summary {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px; cursor: pointer;
  background: #f0f3fa; user-select: none;
  list-style: none; font-size: 12px; font-weight: 700; color: var(--t2);
}
.cat-summary::-webkit-details-marker { display: none; }
.cat-summary::marker { display: none; }
.cat-arrow-icon { font-size: 9px; color: var(--t3); transition: transform .2s; display: inline-block; }
.cat-details:not([open]) .cat-arrow-icon { transform: rotate(-90deg); }
.cat-grp-label { font-weight: 800; font-size: 10px; }
.cat-total .cat-summary { background: #e8edf5; }

/* ── PSI TABLE ── */
.grp-scroll { max-width: 100%; }

/* Month header — flex row, exactly matches table column widths */
/* Table thead — NOT sticky, sits naturally at top of each category table */
table.psi thead.psi-thead th {
  background: #f0f3fa; color: var(--t3);
  font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  padding: 6px 8px; text-align: center;
  border-bottom: 2px solid var(--bdr2); border-right: 1px solid var(--bdr);
  white-space: nowrap;
}
table.psi thead.psi-thead th.th-act { color: var(--act); background: #eff6ff; }
table.psi thead.psi-thead th.th-fut { color: var(--t4); background: #fafbff; }
table.psi thead.psi-thead th.yr-sep { border-left: 2px solid #c7d2fe; }
table.psi thead.psi-thead th.th-lbl {
  position: sticky; left: 0; z-index: 5;
  background: #e8ecf5; text-align: left; padding: 0 12px;
  border-right: 2px solid var(--bdr2) !important;
}

/* Category details / summary */
.cat-det { border-top: 1px solid var(--bdr); }
.cat-det:first-child { border-top: none; }
.cat-sum {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; cursor: pointer; list-style: none;
  background: #f0f3fa; user-select: none;
  font-size: 12px; font-weight: 700; color: var(--t2);
  min-width: max-content;
}
.cat-sum::-webkit-details-marker, .cat-sum::marker { display: none; }
.cat-arr { font-size: 9px; color: var(--t3); transition: transform .2s; display: inline-block; }
.cat-det:not([open]) .cat-arr { transform: rotate(-90deg); }
.cat-total .cat-sum { background: #e8edf5; font-weight: 800; }

/* PSI data table — fixed layout, no thead (header is the flex div above) */
table.psi {
  width: 100%; border-collapse: collapse; table-layout: fixed;
  min-width: 1236px;
}

/* Shared column widths via CSS variable */
:root { --col-lbl: 190px; --col-data: 90px; }

/* Header table — sticky at top of card */
table.psi-hdr {
  width: 100%; border-collapse: collapse; table-layout: fixed;
  font-size: 10px; font-family: 'Inter', sans-serif;
}
table.psi-hdr th {
  background: #f0f3fa; color: var(--t3);
  font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  padding: 6px 10px; text-align: center;
  border-bottom: 2px solid var(--bdr2); border-right: 1px solid var(--bdr);
  white-space: nowrap;
}
table.psi-hdr th.h-act { color: var(--act); background: #eff6ff; }
table.psi-hdr th.h-fut { color: var(--t4); background: #fafbff; }
table.psi-hdr th.yr-sep { border-left: 2px solid #c7d2fe; }
table.psi-hdr th.col-lbl {
  position: sticky; left: 0; z-index: 35;
  width: var(--col-lbl); min-width: var(--col-lbl);
  text-align: left; padding: 0 12px;
  background: #e8ecf5;
  border-right: 2px solid var(--bdr2) !important;
}

/* Data table per category — no thead */
table.psi {
  width: 100%; border-collapse: collapse; table-layout: fixed;
  font-size: 12px; font-family: 'Inter', sans-serif;
}
table.psi tbody td.col-lbl {
  position: sticky; left: 0; z-index: 5;
  width: 180px; min-width: 180px;
  text-align: left; padding: 0 12px;
  background: #f8fafc;
  border-right: 2px solid var(--bdr2) !important;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
table.psi tbody td.yr-sep { border-left: 2px solid #e0e7ff; }
/* Body */
table.psi tbody tr { transition: filter .08s; }
table.psi tbody tr:hover td { filter: brightness(.97); }
table.psi tbody td {
  padding: 0; height: 34px; text-align: right;
  border-right: 1px solid #eef0f6; border-bottom: 1px solid #eef0f6;
  vertical-align: middle;
}
table.psi tbody td.yr-sep { border-left: 2px solid #e0e7ff; }

/* Row type: left border + background */
tr.r-si  td.col-lbl { background: #eff6ff; color: var(--act);  border-left: 4px solid var(--act) !important; font-weight: 600; }
tr.r-st  td.col-lbl { background: #f0fdf4; color: var(--best); border-left: 4px solid var(--best) !important; font-weight: 600; }
tr.r-inv td.col-lbl { background: #faf5ff; color: var(--inv);  border-left: 4px solid var(--inv) !important; font-weight: 600; }
tr.r-inv td { border-top: 2px solid #e8edf5 !important; }
tr.r-cat-hdr td { background: #edf0f7; font-size: 12px; padding: 0 12px; height: 34px; }
tr.r-cat-hdr.cat-total td { background: #e4e9f2; font-weight: 700; }
tr.r-spacer td { background: var(--bg) !important; height: 6px; border: none !important; }
tr.r-mos td { border-top: 2px solid #e8edf5 !important; }
tr.r-mos td.col-lbl { background: #fafafa; color: var(--t3);   border-left: 4px solid #d1d5db !important; font-style: italic; }
tr.r-scen td.col-lbl { background: #fff; color: var(--t4); border-left: 4px solid #f1f5f9 !important; font-weight: 400; padding-left: 22px !important; }
tr.r-scen td.col-lbl.ml-lbl { color: var(--ml); font-weight: 700; font-style: italic; }
tr.r-sep td { background: #e8edf5 !important; height: 2px; padding: 0; border: none; }

tr.r-si  td:not(.col-lbl) { background: #fafcff; }
tr.r-st  td:not(.col-lbl) { background: #fafffe; }
tr.r-inv td:not(.col-lbl) { background: #fdf9ff; }
tr.r-mos td:not(.col-lbl) { background: #fafafa; }
tr.r-scen td:not(.col-lbl) { background: #fefefe; }

/* actual col tint */
tr.r-si  td.act-col { background: #eff6ff !important; }
tr.r-st  td.act-col { background: #f0fdf4 !important; }
tr.r-inv td.act-col { background: #faf5ff !important; }

/* is-total */
tr.is-total td.col-lbl { font-weight: 700 !important; }
tr.is-total td { background-color: #f4f6fc !important; }
tr.is-total td.col-lbl { background: #e8edf5 !important; }

/* Value display */
.cv { display: block; padding: 0 10px; line-height: 34px; font-weight: 600; font-size: 12px; }
tr.r-scen .cv { line-height: 28px; font-size: 11px; font-weight: 500; }
tr.r-scen td { height: 28px; }
.cv-act  { color: var(--act); }
.cv-st   { color: var(--best); }
.cv-inv  { color: var(--inv); }
.cv-best { color: var(--best); font-weight: 500; }
.cv-ml   { color: var(--ml);   font-weight: 700; }
.cv-wst  { color: var(--worst);font-weight: 500; }
.cv-mos-ok   { color: var(--best); font-weight: 700; }
.cv-mos-warn { color: var(--inv);  font-weight: 700; }
.cv-mos-bad  { color: var(--worst);font-weight: 700; }
.cv-nil { color: #d1d5db; font-weight: 400; }

/* Editable inputs */
.e-inp {
  display: block; width: 100%; height: 34px;
  background: transparent; border: none; outline: none;
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  text-align: right; padding: 0 10px; color: var(--t2); cursor: text;
}
tr.r-scen .e-inp { height: 28px; font-size: 11px; }
.e-inp::placeholder { color: #d1d5db; font-weight: 400; }
td:focus-within { background: #fffbf0 !important; }
td:focus-within .e-inp { color: var(--t1); }
.e-inp.saved { color: var(--act); font-weight: 700; }

/* rdot */
.rdot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 7px; vertical-align: middle; flex-shrink: 0; }

/* SCENARIO SUMMARY */
.scen-panel { background: var(--card); border: 1px solid var(--bdr); border-radius: 10px; overflow: hidden; }
.scen-panel-hdr { padding: 12px 18px; background: var(--s1); border-bottom: 1px solid var(--bdr); display: flex; align-items: center; gap: 10px; }
.scen-panel-title { font-size: 13px; font-weight: 700; }
.scen-note { font-size: 11px; color: var(--t3); margin-left: auto; }
.scen-grid { display: grid; grid-template-columns: repeat(3,1fr); }
.scen-col { padding: 16px 20px; }
.scen-col + .scen-col { border-left: 1px solid var(--bdr); }
.scen-col-hd { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding-bottom: 10px; border-bottom: 2px solid; margin-bottom: 10px; }
.best  .scen-col-hd { color: var(--best);  border-color: var(--best); }
.ml    .scen-col-hd { color: var(--ml);    border-color: var(--ml); }
.worst .scen-col-hd { color: var(--worst); border-color: var(--worst); }
.scen-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
.scen-item:last-child { border-bottom: none; padding-top: 8px; border-top: 2px solid #e5e7eb; margin-top: 4px; }
.scen-lbl { font-size: 11px; color: var(--t3); }
.scen-val { font-size: 12px; font-weight: 700; }
.best  .scen-val { color: var(--best); }
.ml    .scen-val { color: var(--ml); }
.worst .scen-val { color: var(--worst); }
.scen-val.big { font-size: 15px; }

/* TOAST */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); color: #fff; font-size: 12px; font-weight: 600; padding: 10px 22px; border-radius: 8px; opacity: 0; pointer-events: none; transition: all .28s; z-index: 999; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ts { background: #15803d; }
#toast.tc { background: #b45309; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* Auto-calculated future cells */
.auto-val { color: inherit; font-style: italic; opacity: .85; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">PSI</div>
  <span class="tb-title">HVAC PSI Dashboard</span>
  <span class="tb-sub">기준: 2026년 2월</span>
  <div class="save-wrap">
    <span class="save-ind" id="saveInd">저장된 데이터 없음</span>
    <button class="btn-save" id="btnSave" onclick="saveData()">💾 저장</button>
    <button class="btn-clr"  id="btnClr"  onclick="clearSaved()">↺ 초기화</button>
    <span class="tb-pill">● Actual: 2025/01 – 2026/02</span>
  </div>
</div>

<!-- SUBBAR -->
<div class="subbar">
  <span class="grp-tab on" onclick="setGrp('all',this)">전체</span>
  <div class="tab-sep"></div>
  <span class="grp-tab" onclick="setGrp('RAC',this)">RAC</span>
  <span class="grp-tab" onclick="setGrp('PAC',this)">PAC</span>
  <span class="grp-tab" onclick="setGrp('SCAC',this)">SCAC</span>
  <span class="grp-tab" onclick="setGrp('Applied',this)">Applied</span>
  <span class="grp-tab" onclick="setGrp('Grand',this)">Grand Total</span>
  <div class="tab-sep"></div>
  <div class="met-pills">
    <span class="met-pill on-cogs" id="pillCOGS" onclick="toggleMet('COGS',this)">COGS (SAR)</span>
    <span class="met-pill"         id="pillUnit" onclick="toggleMet('Unit',this)">Qty (대)</span>
  </div>
  <div class="tab-sep"></div>
  <div class="scen-grp">
    <button class="scen-btn" data-s="Best"        onclick="toggleScen('Best',this)">Best</button>
    <button class="scen-btn on" data-s="Most Likely" onclick="toggleScen('Most Likely',this)">Most Likely</button>
    <button class="scen-btn" data-s="Worst"       onclick="toggleScen('Worst',this)">Worst</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea"></div>
<div id="toast"></div>

    // Show in millions with 1dp, no suffix: e.g. 14.7 (means 14.7M SAR)
    return (v/1e6).toFixed(1);
  } else {
    // Qty: show as integer with comma
    return Math.round(v).toLocaleString();
  }
}
function fmtMOS(v){ if(v==null) return null; return (Math.round(v*10)/10).toFixed(1); }
function parseN(s){
  s=(s||'').trim().replace(/,/g,'');
  if(!s) return null;
  if(/m$/i.test(s)) return parseFloat(s)*1e6;
  if(/k$/i.test(s)) return parseFloat(s)*1e3;
  const n=parseFloat(s); return isNaN(n)?null:n;
}

const dkey=(...a)=>a.join('|');
const cid=(key,m,s)=>`${key}||${m}||${s}`;
function getV(key,m,s){ return RAW.data[key]?.[m]?.[s]??null; }
function getEV(key,m,s){ const e=getEdit(cid(key,m,s)); return e!==undefined?e:getV(key,m,s); }

// ══════════════════════════════════════════
// AGGREGATION CONFIG
// Total rows are computed from sub-categories, not from Excel data
// ══════════════════════════════════════════
const AGG = {
  // RAC Total = sum of RAC sub-cats
  'RAC|RAC Total': [
    ['RAC','Split Inverter'], ['RAC','Split on/off'], ['RAC','Window'], ['RAC','Others']
  ],
  // SCAC Total = sum of SCAC sub-cats
  'SCAC|SCAC Total': [
    ['SCAC','Concealed'], ['SCAC','Cassette'], ['SCAC','Unitary Package'], ['SCAC','Others']
  ],
  // Grand Total = RAC Total + PAC + SCAC Total + Applied + Others
  'Grand|Total': [
    ['RAC','RAC Total'], ['PAC','PAC Total'], ['SCAC','SCAC Total'],
    ['Applied','Applied Total'], ['Others','Others Total']
  ],
};

// Get a data value — for Total rows, sum sub-categories; applies auto-calc for future
function getAggV(type, ch, grp, cat, met, m, scen) {
  const aggKey = grp + '|' + cat;
  const members = AGG[aggKey];
  if (!members) {
    // Non-aggregate: use smart getter (auto-calc for future Actual)
    return getSmartV(type, grp, cat, met, m, scen);
  }
  // Aggregate: sum member values
  let total = null;
  members.forEach(([mGrp, mCat]) => {
    const v = getAggV(type, ch, mGrp, mCat, met, m, scen);
    if (v != null) total = (total || 0) + v;
  });
  return total;
}

// Check if any sub-category has data (for Total rows)
function hasAggData(type, ch, grp, cat, met) {
  const aggKey = grp + '|' + cat;
  const members = AGG[aggKey];
  if (!members) return !!RAW.data[dkey(type, ch, grp, cat, met)];
  return members.some(([mGrp, mCat]) => hasAggData(type, ch, mGrp, mCat, met));
}

// ══════════════════════════════════════════
// AUTO-CALCULATION FOR FUTURE MONTHS
// ══════════════════════════════════════════

// Future Sell-thru "Actual" display = user edit ?? ML value
function getAutoST(grp, cat, met, m) {
  const key = dkey('Sell-thru','Total',grp,cat,met);
  const ev  = getEdit(cid(key, m, 'Actual'));
  if (ev !== undefined) return ev;         // user override wins
  return getV(key, m, 'Most Likely');      // auto: pull ML
}

// Future Inventory = prevINV + SI(ML) - ST(auto), chained month by month
function getAutoINV(grp, cat, met, m) {
  const invKey = dkey('Inventory','Total',grp,cat,met);
  const siKey  = dkey('Sell-in',  'Total',grp,cat,met);

  // User override takes priority
  const ev = getEdit(cid(invKey, m, 'Actual'));
  if (ev !== undefined) return ev;

  // Find index in full MONTHS array
  const mi = MONTHS.indexOf(m);
  if (mi < 0) return null;

  // Get previous month's inventory (actual or computed)
  let prevInv = null;
  if (mi === 0) return null;
  const prevM = MONTHS[mi - 1];
  if (ACT_SET.has(prevM)) {
    prevInv = getV(invKey, prevM, 'Actual');
  } else {
    prevInv = getAutoINV(grp, cat, met, prevM);
  }
  if (prevInv == null) return null;

  // SI: user edit takes priority over ML
  const siEid = cid(siKey, m, 'Actual');
  const siEv  = getEdit(siEid);
  const si    = siEv !== undefined ? siEv : (getV(siKey, m, 'Most Likely') ?? 0);
  const st = getAutoST(grp, cat, met, m) ?? 0;
  return prevInv + si - st;
}

// Smart value getter: applies auto-calc for future Actual rows
function getSmartV(type, grp, cat, met, m, scen) {
  const key = dkey(type,'Total',grp,cat,met);
  if (ACT_SET.has(m)) return getV(key, m, 'Actual');   // actual: raw data
  if (scen === 'Actual') {
    if (type === 'Sell-thru') return getAutoST(grp, cat, met, m);
    if (type === 'Inventory') return getAutoINV(grp, cat, met, m);
    if (type === 'Sell-in')   { const ev=getEdit(cid(key,m,'Actual')); return ev!==undefined?ev:getV(key,m,'Most Likely'); }
  }
  return getEV(key, m, scen);   // scenario rows: raw scenario data
}

function getMOS(grp,cat,m,scen){
  const mi=MONTHS.indexOf(m); if(mi<0) return null;
  // For Actual scen in future months, use auto-calculated inventory
  const aggKey=grp+'|'+cat;
  const isAggCat=!!AGG[aggKey];

  function getInv(g,c,mo,s){
    if(isAggCat){
      // Sum sub-cats
      let tot=null;
      (AGG[g+'|'+c]||[]).forEach(([mg,mc])=>{
        const v=getInv(mg,mc,mo,s);
        if(v!=null) tot=(tot||0)+v;
      });
      return tot;
    }
    const met='COGS';
    if(s==='Actual') return ACT_SET.has(mo)?getV(dkey('Inventory','Total',g,c,met),mo,'Actual'):getAutoINV(g,c,met,mo);
    return getEV(dkey('Inventory','Total',g,c,met),mo,s);
  }
  function getST(g,c,mo,s){
    if(isAggCat){
      let tot=null;
      (AGG[g+'|'+c]||[]).forEach(([mg,mc])=>{
        const v=getST(mg,mc,mo,s);
        if(v!=null) tot=(tot||0)+v;
      });
      return tot;
    }
    const met='COGS';
    if(s==='Actual') return ACT_SET.has(mo)?getV(dkey('Sell-thru','Total',g,c,met),mo,'Actual'):getAutoST(g,c,met,mo);
    return getEV(dkey('Sell-thru','Total',g,c,met),mo,s);
  }

  const inv=getInv(grp,cat,m,scen);
  if(inv==null) return null;
  const stVals=[];
  for(let d=1;d<=3;d++){
    if(mi+d<MONTHS.length){
      const v=getST(grp,cat,MONTHS[mi+d],scen);
      if(v!=null&&v>0) stVals.push(v);
    }
  }
  if(!stVals.length) return null;
  const avg=stVals.reduce((a,b)=>a+b,0)/stVals.length;
  return avg>0?inv/avg:null;
}

// CELL RENDERERS
// ══════════════════════════════════════════
function yrSep(m,i){ return (i>0&&m.slice(0,4)!==DISP[i-1].slice(0,4))?' yr-sep':''; }

function dataCell(key,m,scen,isCOGS,rowType){
  const i=DISP.indexOf(m), sep=yrSep(m,i), actCol=isAct(m)?' act-col':'';
  if(isAct(m)){
    if(scen!=='Actual') return `<td class="${sep}" style="background:rgba(240,242,247,.5)"></td>`;
    const v=getV(key,m,'Actual'), d=fmtTbl(v,isCOGS);
    const cls=rowType==='si'?'cv-act':rowType==='st'?'cv-st':'cv-inv';
    return `<td class="${sep}${actCol}"><span class="cv ${cls}">${d??'<span class="cv-nil">—</span>'}</span></td>`;
  }

  // Future month
  const eid=cid(key,m,scen);
  const cls=rowType==='si'?'cv-act':rowType==='st'?'cv-st':'cv-inv';

  if(scen==='Actual'){
    // SI: editable, ML value as placeholder/default
    if(rowType==='si'){
      const ev=getEdit(eid);
      const mlV=getV(key,m,'Most Likely');
      const dispS=ev!==undefined?(fmtTbl(ev,isCOGS)||''):(mlV!=null?fmtTbl(mlV,isCOGS)||'':'');
      const ph=mlV!=null?fmtTbl(mlV,isCOGS)||'':'—';
      const savedCls=ev!==undefined&&saved[eid]!==undefined?' saved':'';
      return `<td class="${sep} ${actCol}" style="padding:0"><input class="e-inp${savedCls}" type="text" value="${dispS}" placeholder="${ph}" data-cid="${eid}" data-iscogs="${isCOGS}" onchange="handleEdit(this)" onfocus="onFocus(this)" onblur="onBlur(this)"></td>`;
    }
    // INV: read-only, show auto-calculated value
    if(rowType==='inv'){
      // Extract grp/cat from key to call getAutoINV
      // key format: Inventory|Total|grp|cat|met
      const parts=key.split('|');
      const [,,g,c,met]=parts;
      const v=getAutoINV(g,c,met,m), d=fmtTbl(v,isCOGS);
      return `<td class="${sep} ${actCol}"><span class="cv ${cls} auto-val" title="자동계산: 전월INV+SI-ST">${d??'<span class="cv-nil">—</span>'}</span></td>`;
    }
    // ST: editable (user can override ML)
    if(rowType==='st'){
      const ev=getEdit(eid);
      const parts=key.split('|'); const [,,g,c,met]=parts;
      const autoV=getAutoST(g,c,met,m);  // ML value as default
      const dispS=ev!==undefined?(fmtTbl(ev,isCOGS)||''):(autoV!=null?fmtTbl(autoV,isCOGS)||'':'');
      const ph=autoV!=null?fmtTbl(autoV,isCOGS)||'':'—';
      const savedCls=ev!==undefined&&saved[eid]!==undefined?' saved':'';
      return `<td class="${sep} ${actCol}" style="padding:0"><input class="e-inp${savedCls}" type="text" value="${dispS}" placeholder="${ph}" data-cid="${eid}" data-iscogs="${isCOGS}" onchange="handleEdit(this)" onfocus="onFocus(this)" onblur="onBlur(this)"></td>`;
    }
  }

  // Scenario rows: show raw scenario value (read-only display)
  const srcV=getV(key,m,scen);
  const d=fmtTbl(srcV,isCOGS);
  return `<td class="${sep}"><span class="cv ${cls}">${d??'<span class="cv-nil">—</span>'}</span></td>`;
}

function mosCell(grp,cat,m,scen){
  const i=DISP.indexOf(m), sep=yrSep(m,i);
  const v=getMOS(grp,cat,m,scen), d=fmtMOS(v);
  const n=d?parseFloat(d):null;
  const cls=n==null?'cv-nil':n>4?'cv-mos-bad':n>3?'cv-mos-warn':'cv-mos-ok';
  return `<td class="${sep}"><span class="cv ${cls}">${d??'—'}</span></td>`;
}

// RENDER ONE CATEGORY
// ══════════════════════════════════════════
function renderCat(grp,cat,catLbl,isCOGS){
  const met=isCOGS?'COGS':'Qty(Unit)';
  const siKey=dkey('Sell-in','Total',grp,cat,met);
  const stKey=dkey('Sell-thru','Total',grp,cat,met);
  const invKey=dkey('Inventory','Total',grp,cat,met);
  // For Total rows, check sub-cat data; for others check direct data
  const hasSI  = hasAggData('Sell-in',  'Total', grp, cat, met);
  const hasST  = hasAggData('Sell-thru','Total', grp, cat, met);
  const hasInv = hasAggData('Inventory','Total', grp, cat, met);
  const hasMOS = isCOGS && hasAggData('Inventory','Total',grp,cat,'COGS') && hasAggData('Sell-thru','Total',grp,cat,'COGS');
  if(!hasSI&&!hasST&&!hasInv) return '';

  const gc=GRP_COLOR[grp]||'#374151';
  const isTot=cat.includes('Total')||cat==='Total';
  const visScens=SCENS.filter(s=>activeScens.has(s));
  const dot=(col,round=false)=>`<span class="rdot" style="background:${col};border-radius:${round?'50%':'2px'}"></span>`;

  // Cell renderer that uses aggregated values for Total rows
  const aggCell=(type,m,scen,rowType)=>{
    const i=DISP.indexOf(m), sep=yrSep(m,i), actCol=isAct(m)?' act-col':'';
    if(isAct(m)){
      if(scen!=='Actual') return `<td class="${sep}" style="background:rgba(240,242,247,.5)"></td>`;
      const v=getAggV(type,'Total',grp,cat,isCOGS?'COGS':'Qty(Unit)',m,'Actual');
      const d=fmtTbl(v,isCOGS);
      const cls=rowType==='si'?'cv-act':rowType==='st'?'cv-st':'cv-inv';
      return `<td class="${sep}${actCol}"><span class="cv ${cls}">${d??'<span class="cv-nil">—</span>'}</span></td>`;
    }
    // Future: editable — show aggregated source value as placeholder
    const srcV=getAggV(type,'Total',grp,cat,isCOGS?'COGS':'Qty(Unit)',m,scen);
    const d=srcV!=null?fmtTbl(srcV,isCOGS)||'':'';
    const ph=srcV!=null?fmtTbl(srcV,isCOGS)||'':'—';
    // Total rows are read-only (computed from sub-cats)
    const cls=rowType==='si'?'cv-act':rowType==='st'?'cv-st':'cv-inv';
    return `<td class="${sep}${actCol}"><span class="cv ${cls}">${d||'<span class="cv-nil">—</span>'}</span></td>`;
  };

  const mkScenRows=(key,rowType,isMos)=>visScens.map(scen=>{
    const isMl=scen==='Most Likely';
    return `<tr class="r-scen${isTot?' is-total':''}">
      <td class="col-lbl${isMl?' ml-lbl':''}">${isMl?'&#8627; ML &#9733; 기준선':'&#8627; '+scen}</td>
      ${DISP.map(m=>isMos?mosCell(grp,cat,m,scen):dataCell(key,m,scen,isCOGS,rowType)).join('')}
    </tr>`;
  }).join('');

  let rows='';
  if(hasSI){
    // Total rows: use aggCell (computed sum); normal rows: use dataCell
    const siCells = isTot
      ? DISP.map(m=>aggCell('Sell-in',m,'Actual','si')).join('')
      : DISP.map(m=>dataCell(siKey,m,'Actual',isCOGS,'si')).join('');
    rows+=`<tr class="r-si${isTot?' is-total':''}"><td class="col-lbl">${dot('#2563eb')}Sell-in</td>${siCells}</tr>`;
  }
  if(hasST){
    const stActCells = isTot
      ? DISP.map(m=>aggCell('Sell-thru',m,'Actual','st')).join('')
      : DISP.map(m=>dataCell(stKey,m,'Actual',isCOGS,'st')).join('');
    rows+=`<tr class="r-st${isTot?' is-total':''}"><td class="col-lbl">${dot('#059669')}Sell-thru</td>${stActCells}</tr>`;
    // Scenario rows for Total: use aggCell per scen
    if(isTot){
      rows+=visScens.map(scen=>{
        const isMl=scen==='Most Likely';
        return `<tr class="r-scen is-total">
          <td class="col-lbl${isMl?' ml-lbl':''}">${isMl?'&#8627; ML &#9733; 기준선':'&#8627; '+scen}</td>
          ${DISP.map(m=>aggCell('Sell-thru',m,scen,'st')).join('')}
        </tr>`;
      }).join('');
    } else {
      rows+=mkScenRows(stKey,'st',false);
    }
  }
  if(hasInv){
    const invActCells = isTot
      ? DISP.map(m=>aggCell('Inventory',m,'Actual','inv')).join('')
      : DISP.map(m=>dataCell(invKey,m,'Actual',isCOGS,'inv')).join('');
    rows+=`<tr class="r-inv${isTot?' is-total':''}"><td class="col-lbl">${dot('#7c3aed')}Inventory</td>${invActCells}</tr>`;
    if(isTot){
      rows+=visScens.map(scen=>{
        const isMl=scen==='Most Likely';
        return `<tr class="r-scen is-total">
          <td class="col-lbl${isMl?' ml-lbl':''}">${isMl?'&#8627; ML &#9733; 기준선':'&#8627; '+scen}</td>
          ${DISP.map(m=>aggCell('Inventory',m,scen,'inv')).join('')}
        </tr>`;
      }).join('');
    } else {
      rows+=mkScenRows(invKey,'inv',false);
    }
  }
  if(hasMOS){
    rows+=`<tr class="r-mos${isTot?' is-total':''}"><td class="col-lbl">${dot('#7c3aed',true)}MOS(+3)</td>${DISP.map(m=>mosCell(grp,cat,m,'Actual')).join('')}</tr>`;
    rows+=mkScenRows(null,'mos',true);
  }

  const grpLabel=grp==='Grand'?'':
    `<span style="color:${gc};font-weight:800;font-size:10px">${grp} &rsaquo; </span>`;

  const hdrRow=`<tr class="r-cat-hdr${isTot?' cat-total':''}">
    <td class="col-lbl" style="border-left:4px solid ${gc}!important">
      ${grpLabel}${catLbl}
    </td>
    ${DISP.map((m,i)=>`<td class="${yrSep(m,i)}" style="background:#edf0f7"></td>`).join('')}
  </tr>`;

  const detId = 'det-'+grp+'-'+cat.replace(/[^a-z0-9]/gi,'_');
  return `<details class="cat-det${isTot?' cat-total':''}" id="${detId}">
    <summary class="cat-sum" style="border-left:4px solid ${gc}">
      <span class="cat-arr">&#9660;</span>
      ${grpLabel}${catLbl}
    </summary>
    <div style="overflow-x:auto">
      <table class="psi"><colgroup>${colgroup()}</colgroup>
        <thead class="psi-thead"><tr>
          <th class="col-lbl th-lbl">PSI 구분</th>
          ${DISP.map((m,i)=>{
            const sep=(i>0&&m.slice(0,4)!==DISP[i-1].slice(0,4))?' yr-sep':'';
            return `<th class="${isAct(m)?'th-act':'th-fut'}${sep}">${m.slice(2,4)}/${m.slice(4,6)}</th>`;
          }).join('')}
        </tr></thead>
        <tbody>${rows}<tr class="r-spacer"><td colspan="${NC+1}"></td></tr></tbody>
      </table>
    </div>
  </details>`;
}

// KPI CARDS

function renderKPI(){
  const la=RAW.actual_months[RAW.actual_months.length-1];
  const lp=RAW.actual_months[RAW.actual_months.length-2];
  const lbl=la.slice(2,4)+'/'+la.slice(4,6);
  const kv=(t,c,m)=>RAW.data[dkey(t,c,'Grand','Total',m)]?.[la]?.['Actual']??null;
  const kp=(t,c,m)=>RAW.data[dkey(t,c,'Grand','Total',m)]?.[lp]?.['Actual']??null;
  const pct=(a,b)=>a&&b?((a-b)/b*100).toFixed(1):null;
  const si=kv('Sell-in','Total','COGS'), siP=pct(si,kp('Sell-in','Total','COGS'));
  const st=kv('Sell-thru','Total','COGS'), stP=pct(st,kp('Sell-thru','Total','COGS'));
  const inv=kv('Inventory','Total','COGS'), invP=pct(inv,kp('Inventory','Total','COGS'));
  const siQ=kv('Sell-in','Total','Qty(Unit)'), stQ=kv('Sell-thru','Total','Qty(Unit)');
  const mos=getMOS('Grand','Total',la,'Actual');
  const tag=(p,inv=false)=>{
    if(p==null) return '';
    const up=parseFloat(p)>0, good=inv?!up:up;
    return `<div class="kpi-tag ${good?'tag-up':'tag-dn'}">${up?'▲':'▼'} ${Math.abs(p)}% vs 전월</div>`;
  };
  const mosTag=v=>{
    if(!v) return '';
    const n=parseFloat(fmtMOS(v));
    if(n>4) return `<div class="kpi-tag tag-warn">⚠ 재고 과잉 (목표 ≤3.0x)</div>`;
    return `<div class="kpi-tag tag-up">✓ 정상 범위</div>`;
  };
  return `<div class="kpi-strip">
    <div class="kpi-card kc-si"><div class="kpi-lbl">Sell-in · ${lbl}</div><div class="kpi-val" style="color:var(--act)">${fmtTbl(si,true)??'—'}</div><div class="kpi-sub">Qty ${fmtTbl(siQ,false)??'—'} 대</div>${tag(siP)}</div>
    <div class="kpi-card kc-st"><div class="kpi-lbl">Sell-thru · ${lbl}</div><div class="kpi-val" style="color:var(--best)">${fmtTbl(st,true)??'—'}</div><div class="kpi-sub">Qty ${fmtTbl(stQ,false)??'—'} 대</div>${tag(stP)}</div>
    <div class="kpi-card kc-inv"><div class="kpi-lbl">Inventory · ${lbl}</div><div class="kpi-val" style="color:var(--inv)">${fmtTbl(inv,true)??'—'}</div><div class="kpi-sub">전월 ${fmtTbl(kp('Inventory','Total','COGS'),true)??'—'}</div>${tag(invP,true)}</div>
    <div class="kpi-card kc-mos"><div class="kpi-lbl">MOS(+3) · ${lbl}</div><div class="kpi-val" style="color:var(--inv)">${fmtMOS(mos)??'—'}</div><div class="kpi-sub">Grand Total · COGS</div>${mosTag(mos)}</div>
  </div>`;
}

// ══════════════════════════════════════════
// SCENARIO SUMMARY
// ══════════════════════════════════════════
function renderScenSummary(){
  const fm=MONTHS.filter(m=>!ACT_SET.has(m)).slice(0,3);
  const grps=[['RAC','RAC Total','RAC'],['PAC','PAC Total','PAC'],['SCAC','SCAC Total','SCAC'],['Applied','Applied Total','Applied']];
  const sum3=(g,c,s)=>{
    const k=dkey('Sell-thru','Total',g,c,'COGS');
    if(!RAW.data[k]) return null;
    return fm.reduce((acc,m)=>acc+(getEV(k,m,s)||0),0);
  };
  const grand=s=>{
    const k=dkey('Sell-thru','Total','Grand','Total','COGS');
    return fm.reduce((acc,m)=>acc+(getEV(k,m,s)||0),0);
  };
  const mo1=fm[0]?fm[0].slice(2,4)+'/'+fm[0].slice(4,6):'';
  const mo3=fm[2]?fm[2].slice(2,4)+'/'+fm[2].slice(4,6):'';
  const col=(s,cls,lbl,star)=>`<div class="scen-col ${cls}">
    <div class="scen-col-hd">${lbl}${star?' ★':''}</div>
    ${grps.map(([g,c,l])=>`<div class="scen-item"><span class="scen-lbl">${l}</span><span class="scen-val">${fmtM(sum3(g,c,s))??'—'}</span></div>`).join('')}
    <div class="scen-item"><span class="scen-lbl" style="font-weight:700;color:var(--t2)">Grand Total</span><span class="scen-val big">${fmtM(grand(s))??'—'}</span></div>
  </div>`;
  return `<div class="scen-panel">
    <div class="scen-panel-hdr"><span class="scen-panel-title">시나리오별 향후 3개월 Sell-thru 전망</span><span class="scen-note">${mo1}–${mo3} · COGS (SAR)</span></div>
    <div class="scen-grid">${col('Best','best','Best Case',false)}${col('Most Likely','ml','Most Likely',true)}${col('Worst','worst','Worst Case',false)}</div>
  </div>`;
}

// ══════════════════════════════════════════
// FULL RENDER
// ══════════════════════════════════════════
function reRender(){
  // Save which details are currently open before re-rendering
  const openIds = new Set();
  document.querySelectorAll('details.cat-det[open]').forEach(d => {
    if (d.id) openIds.add(d.id);
  });

  const grps=activeGrp==='all'?GRP_ORDER:[activeGrp];
  let html=`<div><div style="font-size:13px;font-weight:700;margin-bottom:12px">최신 실적 요약 <span style="font-size:11px;font-weight:400;color:var(--t3)">Grand Total 기준</span></div>${renderKPI()}</div>`;
  grps.forEach(grp=>{
    const cats=GRP_CATS[grp]||[];
    let blocks='';
    cats.forEach(([cat,lbl])=>{ blocks+=renderCat(grp,cat,lbl,showCOGS); });
    if(!blocks) return;
    const gc=GRP_COLOR[grp], lbl=grp==='Grand'?'Grand Total':grp;
    html+=`<div>
      <div style="font-size:13px;font-weight:700;color:${gc};margin-bottom:8px">${lbl} <span style="font-size:11px;font-weight:400;color:var(--t3)">${showCOGS?'COGS (SAR)':'Qty (대)'} · 최근 6개월 Actual + 6개월 Forecast</span></div>
      <div class="grp-card">
        <div class="grp-card-hdr">
          <span class="grp-card-title">${lbl} PSI</span>
          <div class="legend">
            <div class="leg"><div class="leg-dot" style="background:var(--act)"></div>Sell-in</div>
            <div class="leg"><div class="leg-dot" style="background:var(--best)"></div>Sell-thru</div>
            <div class="leg"><div class="leg-dot" style="background:var(--inv)"></div>Inventory</div>
            <div class="leg"><div class="leg-dot" style="background:#9ca3af;border-radius:50%"></div>MOS(+3)</div>
            <span style="font-size:11px;color:var(--ml);font-weight:700">ML ★ 기준선</span>
          </div>
        </div>
        <div class="grp-scroll">
          ${blocks}
        </div>
      </div>
    </div>`;
  });
  html+=renderScenSummary();
  document.getElementById('mainArea').innerHTML=html;

  // Restore open state
  if (openIds.size > 0) {
    document.querySelectorAll('details.cat-det').forEach(d => {
      if (d.id && openIds.has(d.id)) d.open = true;
    });
  }
}

// ══════════════════════════════════════════
// INPUT HANDLERS
// ══════════════════════════════════════════
function onFocus(inp){
  const {cid:eid,iscogs}=inp.dataset;
  const isCOGS=iscogs==='true';
  const ev=getEdit(eid);
  const [key,,m,,s]=eid.split('||');
  const v=ev!==undefined?ev:getV(key,m,s);
  inp.value=v!=null?(isCOGS?(v/1e6).toFixed(4):Math.round(v).toString()):'';
  inp.select();
}
function onBlur(inp){
  const {cid:eid,iscogs}=inp.dataset;
  const isCOGS=iscogs==='true';
  const ev=getEdit(eid);
  const [key,,m,,s]=eid.split('||');
  const v=ev!==undefined?ev:getV(key,m,s);
  inp.value=v!=null?(fmtTbl(v,isCOGS)||''):'';
  // Rerender so Inventory, MOS, Total rows all update immediately
  reRender();
}
function handleEdit(inp){
  const {cid:eid}=inp.dataset;
  const v=parseN(inp.value);
  setEdit(eid,v);
  // Don't reRender mid-typing — wait for blur
}

// ══════════════════════════════════════════
// TOOLBAR
// ══════════════════════════════════════════
function setGrp(g,el){
  activeGrp=g;
  document.querySelectorAll('.grp-tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); reRender();
}
function toggleMet(m,el){
  showCOGS=m==='COGS';
  document.getElementById('pillCOGS').className='met-pill'+(showCOGS?' on-cogs':'');
  document.getElementById('pillUnit').className='met-pill'+(!showCOGS?' on-unit':'');
  reRender();
}
function toggleScen(s,btn){
  if(activeScens.has(s)){activeScens.delete(s);btn.classList.remove('on');}
  else{activeScens.add(s);btn.classList.add('on');}
  reRender();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
loadSaved(); updateSaveUI(); reRender();
</script>
